l_english:

 # Military Industrial Organizations - United States 2025

 # Lockheed Martin Aeronautics
 USA_lockheed_martin_aeronautics_organization:0 "Lockheed Martin Aeronautics"
 USA_lockheed_martin_aeronautics_organization_desc:0 "Fort Worth, Texas. Builder of the F-35 Lightning II, F-22 Raptor and F-16, and home of the Skunk Works advanced projects division."
 USA_mio_trait_lm_low_observable:0 "Low-Observable Shaping"
 USA_mio_trait_lm_low_observable_desc:0 "Faceted planforms and radar-absorbent skins buy survivability at the price of a costlier airframe."
 USA_mio_trait_lm_sensor_fusion:0 "Sensor Fusion"
 USA_mio_trait_lm_sensor_fusion_desc:0 "One fused picture from every sensor on the aircraft, handed to the pilot instead of six separate displays."
 USA_mio_trait_lm_skunk_works:0 "Skunk Works"
 USA_mio_trait_lm_skunk_works_desc:0 "A small shop with a short chain of command, left alone to build things nobody has built before."
 USA_mio_trait_lm_joint_strike_line:0 "Joint Strike Fighter Line"
 USA_mio_trait_lm_joint_strike_line_desc:0 "A single mile-long moving line feeding allied air forces as well as our own."

 # Boeing Defense, Space & Security
 USA_boeing_defense_organization:0 "Boeing Defense, Space & Security"
 USA_boeing_defense_organization_desc:0 "St. Louis, Missouri and Everett, Washington. Builds the F-15EX, F/A-18 Super Hornet, KC-46 tanker and rotorcraft."
 USA_mio_trait_boeing_advanced_avionics:0 "Advanced Cockpit Avionics"
 USA_mio_trait_boeing_advanced_avionics_desc:0 "Large-area displays and open mission computers, refreshed faster than the airframes carrying them."
 USA_mio_trait_boeing_eagle_ii:0 "Eagle II Modernisation"
 USA_mio_trait_boeing_eagle_ii_desc:0 "An old, proven airframe re-engined and rewired rather than replaced."
 USA_mio_trait_boeing_aerial_refuelling:0 "Aerial Refuelling Boom"
 USA_mio_trait_boeing_aerial_refuelling_desc:0 "Tankers turn every short-legged fighter in the inventory into a long-range one."
 USA_mio_trait_boeing_st_louis_line:0 "St. Louis Assembly"
 USA_mio_trait_boeing_st_louis_line_desc:0 "Decades of uninterrupted combat-aircraft production in one plant, and the workforce that comes with it."

 # Northrop Grumman Aeronautics Systems
 USA_northrop_grumman_organization:0 "Northrop Grumman Aeronautics Systems"
 USA_northrop_grumman_organization_desc:0 "Palmdale, California. Flying-wing specialists behind the B-2 Spirit and the B-21 Raider."
 USA_mio_trait_ng_flying_wing:0 "Flying Wing Planform"
 USA_mio_trait_ng_flying_wing_desc:0 "No fuselage, no tail - just wing. Less drag, less to see on a radar screen."
 USA_mio_trait_ng_radar_absorbent:0 "Radar-Absorbent Structures"
 USA_mio_trait_ng_radar_absorbent_desc:0 "Absorbent material cured into the structure itself, not painted on afterwards."
 USA_mio_trait_ng_open_architecture:0 "Open Mission Systems"
 USA_mio_trait_ng_open_architecture_desc:0 "Standard interfaces so a new sensor or weapon can be added without redesigning the aircraft."
 USA_mio_trait_ng_raider_program:0 "Raider Programme"
 USA_mio_trait_ng_raider_program_desc:0 "Digital design and a stable production run, deliberately kept boring to keep it affordable."

 # Sikorsky Aircraft
 USA_sikorsky_organization:0 "Sikorsky Aircraft"
 USA_sikorsky_organization_desc:0 "Stratford, Connecticut. Builds the UH-60 Black Hawk, MH-60 Seahawk and CH-53K King Stallion."
 USA_mio_trait_sik_composite_rotors:0 "Composite Rotor Blades"
 USA_mio_trait_sik_composite_rotors_desc:0 "Titanium-spar composite blades that survive damage a metal blade would not."
 USA_mio_trait_sik_crashworthy_airframe:0 "Crashworthy Airframe"
 USA_mio_trait_sik_crashworthy_airframe_desc:0 "Energy-absorbing seats and landing gear, designed around the crew walking away."
 USA_mio_trait_sik_naval_variants:0 "Naval Variants"
 USA_mio_trait_sik_naval_variants_desc:0 "Folding rotors, corrosion-proofed structure and a hauling hook for shipboard work."
 USA_mio_trait_sik_utility_workhorse:0 "Utility Workhorse"
 USA_mio_trait_sik_utility_workhorse_desc:0 "One airframe, thirty roles, built in numbers nobody else can match."

 # Bell Textron
 USA_bell_textron_organization:0 "Bell Textron"
 USA_bell_textron_organization_desc:0 "Fort Worth, Texas. Tiltrotor pioneers - the V-22 Osprey and the V-280 Valor."
 USA_mio_trait_bell_tiltrotor:0 "Tiltrotor Configuration"
 USA_mio_trait_bell_tiltrotor_desc:0 "Take off like a helicopter, cruise like a turboprop. Twice the speed, twice the complexity."
 USA_mio_trait_bell_fly_by_wire:0 "Triple-Redundant Fly-by-Wire"
 USA_mio_trait_bell_fly_by_wire_desc:0 "Three independent flight-control channels voting against each other."
 USA_mio_trait_bell_armed_scout:0 "Armed Reconnaissance"
 USA_mio_trait_bell_armed_scout_desc:0 "Light, fast, and armed enough to shoot its way back out of what it flew into."
 USA_mio_trait_bell_valor_program:0 "Long-Range Assault Programme"
 USA_mio_trait_bell_valor_program_desc:0 "Air assault at ranges that put the launch point outside the enemy fire envelope."

 # General Atomics Aeronautical Systems
 USA_general_atomics_organization:0 "General Atomics Aeronautical Systems"
 USA_general_atomics_organization_desc:0 "Poway, California. The MQ-9 Reaper and MQ-20 Avenger - unmanned aircraft measured in days aloft, not hours."
 USA_mio_trait_ga_unmanned_airframe:0 "Unmanned Airframe"
 USA_mio_trait_ga_unmanned_airframe_desc:0 "No cockpit, no ejection seat, no life support. Everything that kept a pilot alive is now payload."
 USA_mio_trait_ga_persistent_orbit:0 "Persistent Orbit"
 USA_mio_trait_ga_persistent_orbit_desc:0 "High-aspect wings and a miserly engine, sat over one patch of ground for a day and a half."
 USA_mio_trait_ga_satellite_datalink:0 "Satellite Datalink"
 USA_mio_trait_ga_satellite_datalink_desc:0 "Flown from a container half a world away, so range is a matter of fuel rather than crew endurance."
 USA_mio_trait_ga_hunter_killer:0 "Hunter-Killer Doctrine"
 USA_mio_trait_ga_hunter_killer_desc:0 "The aircraft that found the target is the one that strikes it, minutes later."

 # Anduril Industries
 USA_anduril_organization:0 "Anduril Industries"
 USA_anduril_organization_desc:0 "Columbus, Ohio and Costa Mesa, California. Autonomous collaborative aircraft and loitering munitions, built like consumer electronics."
 USA_mio_trait_and_autonomy_stack:0 "Autonomy Software Stack"
 USA_mio_trait_and_autonomy_stack_desc:0 "One software layer flying every airframe in the fleet, updated on a software schedule rather than an airframe one."
 USA_mio_trait_and_attritable_mass:0 "Attritable Mass"
 USA_mio_trait_and_attritable_mass_desc:0 "Cheap enough to lose on purpose. Quantity has a quality of its own, and this is what it costs."
 USA_mio_trait_and_collaborative_combat:0 "Collaborative Combat Aircraft"
 USA_mio_trait_and_collaborative_combat_desc:0 "Unmanned wingmen flying formation off a crewed fighter, absorbing the risky part of the mission."
 USA_mio_trait_and_arsenal_plant:0 "Arsenal Plant"
 USA_mio_trait_and_arsenal_plant_desc:0 "A commercial-scale factory tooled for one thing: volume, on a timeline measured in months."

 # General Dynamics Land Systems
 USA_gd_land_systems_organization:0 "General Dynamics Land Systems"
 USA_gd_land_systems_organization_desc:0 "Lima, Ohio and Sterling Heights, Michigan. The M1 Abrams line - the only heavy armour plant left in the country."
 USA_mio_trait_gdls_gas_turbine:0 "Gas Turbine Powerpack"
 USA_mio_trait_gdls_gas_turbine_desc:0 "Enormous power from a quiet, smooth turbine. It drinks fuel like nothing else on the battlefield."
 USA_mio_trait_gdls_composite_armour:0 "Composite Armour Array"
 USA_mio_trait_gdls_composite_armour_desc:0 "Layered ceramic and steel matrices that defeat shaped charges far above their weight."
 USA_mio_trait_gdls_dense_penetrators:0 "Dense Long-Rod Penetrators"
 USA_mio_trait_gdls_dense_penetrators_desc:0 "A very heavy dart at very high velocity. Nothing clever, just physics."
 USA_mio_trait_gdls_next_gen_mbt:0 "Next-Generation Main Battle Tank"
 USA_mio_trait_gdls_next_gen_mbt_desc:0 "A lighter hull, a hybrid drive and an unmanned turret - if the funding survives the next budget."

 # BAE Systems Land & Armaments
 USA_bae_land_armaments_organization:0 "BAE Systems Land & Armaments"
 USA_bae_land_armaments_organization_desc:0 "York, Pennsylvania. Bradley fighting vehicles, the AMPV family, M109 Paladin and amphibious combat vehicles."
 USA_mio_trait_bae_spaced_armour:0 "Spaced Applique Armour"
 USA_mio_trait_bae_spaced_armour_desc:0 "Bolt-on plates standing off the hull, cheaper to replace than the vehicle behind them."
 USA_mio_trait_bae_turreted_ifv:0 "Two-Man Turreted IFV"
 USA_mio_trait_bae_turreted_ifv_desc:0 "An autocannon and anti-tank missiles on a vehicle that also carries a rifle squad."
 USA_mio_trait_bae_common_hull:0 "Common Hull Family"
 USA_mio_trait_bae_common_hull_desc:0 "Five roles, one hull, one spare-parts bin, one training pipeline."
 USA_mio_trait_bae_active_protection:0 "Active Protection System"
 USA_mio_trait_bae_active_protection_desc:0 "Radar spots the incoming round and a countermunition kills it before it arrives. Usually."

 # Oshkosh Defense
 USA_oshkosh_defense_organization:0 "Oshkosh Defense"
 USA_oshkosh_defense_organization_desc:0 "Oshkosh, Wisconsin. The JLTV, the HEMTT and the heavy tactical truck fleet the whole army moves on."
 USA_mio_trait_osh_independent_suspension:0 "Independent Suspension"
 USA_mio_trait_osh_independent_suspension_desc:0 "Every wheel travels on its own. Cross-country speed roughly doubles, and so do the spares."
 USA_mio_trait_osh_v_hull:0 "V-Shaped Blast Hull"
 USA_mio_trait_osh_v_hull_desc:0 "A hull shaped to throw a mine blast outward instead of into the crew compartment."
 USA_mio_trait_osh_common_chassis:0 "Common Chassis Production"
 USA_mio_trait_osh_common_chassis_desc:0 "One chassis under the whole light tactical fleet, built on a truck-industry line."
 USA_mio_trait_osh_protected_mobility:0 "Protected Mobility Programme"
 USA_mio_trait_osh_protected_mobility_desc:0 "Armour and speed on a vehicle cheap enough to issue to everyone, not just the assault force."

 # Raytheon (RTX)
 USA_raytheon_organization:0 "Raytheon (RTX)"
 USA_raytheon_organization_desc:0 "Tucson, Arizona and Andover, Massachusetts. Patriot, AMRAAM, Stinger, Javelin - the missile house."
 USA_mio_trait_rtx_guided_munitions:0 "Precision Guided Munitions"
 USA_mio_trait_rtx_guided_munitions_desc:0 "A guidance package on every round. Fewer shots fired, far more targets hit."
 USA_mio_trait_rtx_phased_array:0 "Phased-Array Fire Control"
 USA_mio_trait_rtx_phased_array_desc:0 "A radar that steers its beam electronically, tracking a hundred tracks while guiding a dozen intercepts."
 USA_mio_trait_rtx_top_attack:0 "Top-Attack Profiles"
 USA_mio_trait_rtx_top_attack_desc:0 "The missile climbs, then dives onto the thin roof armour. Fire-and-forget, from a shoulder."
 USA_mio_trait_rtx_layered_air_defence:0 "Layered Air Defence"
 USA_mio_trait_rtx_layered_air_defence_desc:0 "Long, medium and short range interceptors on one integrated fire-control picture."

 # Lockheed Martin Missiles and Fire Control
 USA_lm_missiles_fire_control_organization:0 "Lockheed Martin Missiles and Fire Control"
 USA_lm_missiles_fire_control_organization_desc:0 "Camden, Arkansas and Orlando, Florida. HIMARS, GMLRS, ATACMS, JASSM and the PAC-3 interceptor."
 USA_mio_trait_lmfc_shoot_and_scoot:0 "Shoot-and-Scoot Doctrine"
 USA_mio_trait_lmfc_shoot_and_scoot_desc:0 "Fire the pod, drive away before counter-battery radar finishes the firing solution."
 USA_mio_trait_lmfc_guided_rockets:0 "Guided Rocket Artillery"
 USA_mio_trait_lmfc_guided_rockets_desc:0 "Satellite guidance on every rocket turned area saturation into precision fires."
 USA_mio_trait_lmfc_hit_to_kill:0 "Hit-to-Kill Interceptors"
 USA_mio_trait_lmfc_hit_to_kill_desc:0 "No warhead. The interceptor simply hits the incoming missile, at closing speeds no fragment could match."
 USA_mio_trait_lmfc_deep_strike:0 "Deep Precision Strike"
 USA_mio_trait_lmfc_deep_strike_desc:0 "Reaching the enemy command posts and depots without asking the air force for a sortie."

 # SIG Sauer
 USA_sig_sauer_organization:0 "SIG Sauer"
 USA_sig_sauer_organization_desc:0 "Newington, New Hampshire. Winner of the Next Generation Squad Weapon programme - the XM7 rifle and XM250 automatic rifle."
 USA_mio_trait_sig_next_gen_cartridge:0 "Next-Generation Cartridge"
 USA_mio_trait_sig_next_gen_cartridge_desc:0 "A hybrid case at pressures no conventional brass would survive, to punch modern body armour at range."
 USA_mio_trait_sig_modular_receiver:0 "Modular Receiver Group"
 USA_mio_trait_sig_modular_receiver_desc:0 "One serialised core, swappable barrels and grips. The armourer changes calibres in a field tent."
 USA_mio_trait_sig_computerised_optics:0 "Computerised Fire Control"
 USA_mio_trait_sig_computerised_optics_desc:0 "A rangefinder, ballistic computer and disturbed reticle on every rifle in the squad."
 USA_mio_trait_sig_squad_weapon_programme:0 "Squad Weapon Programme"
 USA_mio_trait_sig_squad_weapon_programme_desc:0 "Re-equipping the close-combat force wholesale, for the first time in two generations."

 # FN America
 USA_fn_america_organization:0 "FN America"
 USA_fn_america_organization_desc:0 "Columbia, South Carolina. Builds the M240 and M249 machine guns and the M16/M4 family under contract."
 USA_mio_trait_fn_belt_fed_automatics:0 "Belt-Fed Automatics"
 USA_mio_trait_fn_belt_fed_automatics_desc:0 "Sustained fire is what pins an enemy squad. Everything else in the section works around it."
 USA_mio_trait_fn_chrome_lined_barrels:0 "Chrome-Lined Barrels"
 USA_mio_trait_fn_chrome_lined_barrels_desc:0 "Hard chrome bores that shrug off corrosion and thousands of rounds of neglect."
 USA_mio_trait_fn_polymer_furniture:0 "Polymer Furniture"
 USA_mio_trait_fn_polymer_furniture_desc:0 "Moulded polymer instead of machined steel and walnut - lighter, cheaper, and made by the thousand."
 USA_mio_trait_fn_columbia_plant:0 "Columbia Plant Capacity"
 USA_mio_trait_fn_columbia_plant_desc:0 "A single plant carrying the standing small-arms contract for the entire armed forces."

 # Newport News Shipbuilding
 USA_newport_news_organization:0 "Newport News Shipbuilding"
 USA_newport_news_organization_desc:0 "Newport News, Virginia. The only yard in the country able to build nuclear aircraft carriers."
 USA_mio_trait_nns_nuclear_propulsion:0 "Nuclear Propulsion"
 USA_mio_trait_nns_nuclear_propulsion_desc:0 "Twenty years between refuellings. The escorts run out of fuel long before the carrier does."
 USA_mio_trait_nns_electromagnetic_launch:0 "Electromagnetic Launch System"
 USA_mio_trait_nns_electromagnetic_launch_desc:0 "Linear motors instead of steam catapults - gentler on airframes, higher sortie rate, harder to keep running."
 USA_mio_trait_nns_modular_construction:0 "Modular Superlift Construction"
 USA_mio_trait_nns_modular_construction_desc:0 "Whole ship sections outfitted on land and craned into place, instead of built up from the keel."
 USA_mio_trait_nns_supercarrier_programme:0 "Supercarrier Programme"
 USA_mio_trait_nns_supercarrier_programme_desc:0 "A hundred thousand tons of sovereign airfield, anchored to no one's permission."

 # General Dynamics Electric Boat
 USA_electric_boat_organization:0 "General Dynamics Electric Boat"
 USA_electric_boat_organization_desc:0 "Groton, Connecticut and Quonset Point, Rhode Island. Virginia-class attack boats and Columbia-class ballistic missile submarines."
 USA_mio_trait_eb_nuclear_reactor:0 "Naval Nuclear Reactor"
 USA_mio_trait_eb_nuclear_reactor_desc:0 "Submerged endurance limited by the food in the lockers, not the air in the boat."
 USA_mio_trait_eb_pump_jet:0 "Pump-Jet Propulsor"
 USA_mio_trait_eb_pump_jet_desc:0 "A shrouded impeller that suppresses the cavitation a bare screw would broadcast for miles."
 USA_mio_trait_eb_vertical_launch:0 "Vertical Launch Modules"
 USA_mio_trait_eb_vertical_launch_desc:0 "Cruise missiles in bow tubes, so the boat can strike inland without surfacing."
 USA_mio_trait_eb_attack_boat_programme:0 "Attack Boat Programme"
 USA_mio_trait_eb_attack_boat_programme_desc:0 "Two hulls a year, every year, from a yard that has never stopped building submarines."

 # Ingalls Shipbuilding
 USA_ingalls_shipbuilding_organization:0 "Ingalls Shipbuilding"
 USA_ingalls_shipbuilding_organization_desc:0 "Pascagoula, Mississippi. Arleigh Burke destroyers, amphibious assault ships and coast guard cutters."
 USA_mio_trait_ing_aegis_combat_system:0 "Integrated Combat System"
 USA_mio_trait_ing_aegis_combat_system_desc:0 "Radar, fire control and weapons run as one machine, engaging faster than a crew could decide."
 USA_mio_trait_ing_vertical_launch_cells:0 "Vertical Launch Cells"
 USA_mio_trait_ing_vertical_launch_cells_desc:0 "Ninety-six cells, loaded for whichever war the ship is actually sailing into."
 USA_mio_trait_ing_gulf_coast_yard:0 "Gulf Coast Yard"
 USA_mio_trait_ing_gulf_coast_yard_desc:0 "Deep water, warm weather and a workforce that has built destroyers for three generations."
 USA_mio_trait_ing_serial_destroyer_build:0 "Serial Destroyer Production"
 USA_mio_trait_ing_serial_destroyer_build_desc:0 "The same proven hull, in flight after flight, for forty years and counting."

 # Bath Iron Works
 USA_bath_iron_works_organization:0 "Bath Iron Works"
 USA_bath_iron_works_organization_desc:0 "Bath, Maine. Arleigh Burke and Zumwalt class destroyers, built by a yard with a reputation for finish quality."
 USA_mio_trait_biw_low_observable_hull:0 "Low-Observable Hull Form"
 USA_mio_trait_biw_low_observable_hull_desc:0 "Tumblehome sides and enclosed masts that return a fishing-boat radar signature from a destroyer."
 USA_mio_trait_biw_integrated_power:0 "Integrated Electric Propulsion"
 USA_mio_trait_biw_integrated_power_desc:0 "All power on one bus, switched between propulsion and sensors as the fight demands."
 USA_mio_trait_biw_maine_shipwrights:0 "Maine Shipwrights"
 USA_mio_trait_biw_maine_shipwrights_desc:0 "Bath-built is best-built, and the yard has been saying so since 1884."
 USA_mio_trait_biw_advanced_destroyer:0 "Advanced Destroyer Programme"
 USA_mio_trait_biw_advanced_destroyer_desc:0 "A small class of very expensive ships, bought to prove what the next large class should be."

 # L3Harris Technologies
 USA_l3harris_organization:0 "L3Harris Technologies"
 USA_l3harris_organization_desc:0 "Melbourne, Florida. Tactical radios, night vision, electronic warfare and battlefield networks."
 USA_mio_trait_l3_tactical_radios:0 "Software-Defined Radios"
 USA_mio_trait_l3_tactical_radios_desc:0 "One radio, reprogrammed in the field for whichever waveform the coalition is using this week."
 USA_mio_trait_l3_night_vision:0 "Fused Night Vision"
 USA_mio_trait_l3_night_vision_desc:0 "Image intensification and thermal overlaid in one eyepiece. The night stops being cover."
 USA_mio_trait_l3_electronic_warfare:0 "Electronic Warfare Suites"
 USA_mio_trait_l3_electronic_warfare_desc:0 "Finding, jamming and spoofing the other side's network before the shooting starts."
 USA_mio_trait_l3_melbourne_campus:0 "Melbourne Campus"
 USA_mio_trait_l3_melbourne_campus_desc:0 "Electronics built on commercial lines and commercial timescales, then ruggedised for the field."
