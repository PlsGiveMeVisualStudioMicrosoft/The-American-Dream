 usa_inauguration.2.t:0 "The Forty-Seventh President"
 usa_inauguration.2.d:0 "At noon on the steps of the Capitol, Donald J. Trump has taken the oath of office as President of the United States, becoming only the second man in the nation's history to return to the presidency after leaving it.\n\nThe outgoing administration has handed over the machinery of government, and with it the direction of American policy at home and abroad. A wave of executive orders is expected before the day is out. Foreign capitals are already rewriting their assumptions about Washington.\n\nThe country now enters a new political era."
 usa_inauguration.2.a:0 "A new administration takes the reins."

 usa_inauguration.10.t:0 "WASHINGTON: Trump Inaugurated as 47th President"
 usa_inauguration.10.d:0 "Under a cold January sky, the United States has sworn in Donald J. Trump as its forty-seventh president, completing a return to power four years after he left office.\n\nCrowds filled the National Mall while cameras carried the ceremony to every capital on earth. Allies and rivals alike are weighing what the change of administration means for trade, for alliances, and for the balance of power - and how quickly Washington intends to act.\n\nThe world is watching."
 usa_inauguration.10.a:0 "A new era begins."
 usa_inauguration.10.b:0 "We will be watching Washington closely."
