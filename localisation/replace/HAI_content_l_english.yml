 HAI_GATHERING_STORM_DESC:0 "The Republic of Haiti begins 2025 on the edge of institutional collapse. The Transitional Presidential Council governs from a fortified district while Viv Ansanm surrounds the capital, Gran Grif dominates Artibonite, and Kraze Baryè controls the eastern corridor. Rebuild the republic, impose emergency rule, seek an international stabilization regime, or gamble on negotiations with the armed coalitions."

 VIV_neutrality_party:0 "Viv Ansanm"
 VIV_neutrality_party_long:0 "Viv Ansanm Gang Coalition"
 GRF_neutrality_party:0 "Gran Grif"
 GRF_neutrality_party_long:0 "Gran Grif de Savien"
 KRB_neutrality_party:0 "Kraze Baryè"
 KRB_neutrality_party_long:0 "Kraze Baryè Armed Group"

 HAI_Leslie_Voltaire:0 "Leslie Voltaire"
 HAI_Fritz_Alphonse_Jean:0 "Fritz Alphonse Jean"
 HAI_Laurent_Saint_Cyr:0 "Laurent Saint-Cyr"
 VIV_Jimmy_Cherizier:0 "Jimmy Chérizier"
 GRF_Luckson_Elan:0 "Luckson Elan"
 KRB_Vitelhomme_Innocent:0 "Vitel'Homme Innocent"

 HAI_rotating_president:0 "Rotating Council President"
 HAI_rotating_president_desc:0 "The chairman speaks for a divided transitional council whose factions rarely agree on more than the need to survive."
 HAI_former_police_commander:0 "Former Police Commander"
 HAI_former_police_commander_desc:0 "Years in the police provide experience in urban security operations and the weaknesses of the Haitian state."
 HAI_gang_boss:0 "Armed Coalition Leader"
 HAI_gang_boss_desc:0 "Authority rests on personal loyalties, territorial control and the willingness to use force."

 HAI_transitional_presidential_council:0 "Transitional Presidential Council"
 HAI_transitional_presidential_council_desc:0 "Haiti's collective presidency is a temporary compromise between political blocs, civil society and private interests. Its legitimacy and ability to act remain deeply contested."
 HAI_collapsed_state_institutions:0 "Collapsed State Institutions"
 HAI_collapsed_state_institutions_desc:0 "Courts, ministries and local administrations have lost control over much of the country. Even routine government work is dangerous and unreliable."
 HAI_gang_controlled_capital:0 "Gang-Controlled Capital"
 HAI_gang_controlled_capital_desc:0 "Armed coalitions dominate the approaches to Port-au-Prince, severing roads and turning districts into isolated enclaves."
 HAI_mass_displacement:0 "Mass Displacement"
 HAI_mass_displacement_desc:0 "Hundreds of thousands have fled violence, overwhelming the remaining public services and disrupting economic life."
 HAI_underfunded_security_forces:0 "Underfunded Security Forces"
 HAI_underfunded_security_forces_desc:0 "The police and the small restored armed forces lack personnel, equipment, transport and reliable command."
 HAI_multinational_security_support:0 "Limited International Security Support"
 HAI_multinational_security_support_desc:0 "A small foreign advisory and logistical presence provides badly needed support, but its limited size and uncertain funding prevent a decisive restoration of order."
 HAI_reformed_pnh:0 "Reorganized Haitian National Police"
 HAI_reformed_pnh_desc:0 "A streamlined command structure and emergency recruitment have made the national police a more coherent fighting force."
 HAI_emergency_administration:0 "Emergency Administrative Mandate"
 HAI_emergency_administration_desc:0 "The council has authorized a small executive secretariat to keep decisions moving while the wider state remains paralysed."
 HAI_customs_revenue_administration:0 "Restored Customs Revenue"
 HAI_customs_revenue_administration_desc:0 "Reliable customs receipts provide the government with a narrow but dependable source of political and administrative capacity."
 HAI_confidential_informants:0 "Confidential Informant Network"
 HAI_confidential_informants_desc:0 "Protected witnesses, paid sources and defectors provide the government with actionable intelligence on armed networks."
 HAI_restored_authority:0 "Restored State Authority"
 HAI_restored_authority_desc:0 "The major armed enclaves have been dismantled and national institutions can once again operate across Haiti."
 HAI_new_republic_idea:0 "A New Haitian Republic"
 HAI_new_republic_idea_desc:0 "Elections and constitutional government have returned after years of rule by emergency decree."
 HAI_national_directorate_idea:0 "The National Directorate"
 HAI_national_directorate_idea_desc:0 "Military and police commanders now direct the state under permanent emergency powers."
 HAI_salvation_government_idea:0 "Government of National Salvation"
 HAI_salvation_government_idea_desc:0 "Former enemies have been absorbed into an unstable coalition that exchanges justice for immediate peace."
 HAI_international_protectorate:0 "International Stabilization Regime"
 HAI_international_protectorate_desc:0 "Foreign security forces and administrators protect essential infrastructure at the price of Haitian political autonomy."
 HAI_recovery_fund_idea:0 "Haitian Recovery Fund"
 HAI_recovery_fund_idea_desc:0 "Customs revenues and foreign grants are being directed into a single monitored reconstruction program."
 HAI_armed_network:0 "Armed Territorial Network"
 HAI_armed_network_desc:0 "Loosely organized armed groups use neighborhood ties and coercion to mobilize fighters quickly."
 HAI_illicit_economy:0 "Illicit Economy"
 HAI_illicit_economy_desc:0 "Revenue comes from coercive taxation, captured commerce and criminal networks rather than a functioning state economy."
 HAI_fragmented_command:0 "Fragmented Command"
 HAI_fragmented_command_desc:0 "Individual commanders guard their autonomy and often ignore any central plan."
 HAI_operational_exhaustion:0 "Operational Exhaustion"
 HAI_operational_exhaustion_desc:0 "A major operation has consumed ammunition, cash and the attention of local commanders. Another large attack cannot be organized immediately."
 VIV_coalition_in_disarray:0 "Coalition in Disarray"
 VIV_coalition_in_disarray_desc:0 "Arrests, defections and planted accusations have paralysed Viv Ansanm's political coordination. Its fighters remain dangerous, but its command cannot organize major operations."
 GRF_routes_under_surveillance:0 "Routes Under Surveillance"
 GRF_routes_under_surveillance_desc:0 "Informants and mobile police posts have exposed Gran Grif's transport network. Its strongholds remain defended, but large predatory operations are temporarily impossible."
 KRB_ransom_channels_frozen:0 "Ransom Channels Frozen"
 KRB_ransom_channels_frozen_desc:0 "Intermediaries, cash routes and safe houses have been compromised. Kraze Baryè retains its armed strength but cannot efficiently finance new operations."
 VIV_urban_strongholds:0 "Urban Strongholds"
 VIV_urban_strongholds_desc:0 "Viv Ansanm is entrenched through the dense metropolitan districts surrounding the government enclave."
 GRF_artibonite_network:0 "Artibonite Network"
 GRF_artibonite_network_desc:0 "Gran Grif dominates rural routes and settlements across the lower Artibonite region."
 KRB_eastern_corridor:0 "Eastern Capital Corridor"
 KRB_eastern_corridor_desc:0 "Kraze Baryè controls communities and approaches east of the capital."
 HAI_criminal_hegemony:0 "Criminal Hegemony"
 HAI_criminal_hegemony_desc:0 "One armed network has defeated its rivals and imposed a violent order over Haiti. It remains a coercive regime, not a functional modern state."

 HAI_cssm_framework:0 "Caribbean Security Support Mission"
 HAI_cssm_framework_desc:0 "A regional partner has agreed to lead a Caribbean mission that coordinates intelligence, logistics and security operations under Haitian command."
 HAI_foreign_dependence:0 "Foreign Dependence"
 HAI_foreign_dependence_desc:0 "Emergency foreign assistance keeps the state alive while steadily limiting its freedom of action."
 HAI_support_not_occupation_idea:0 "Support, Not Occupation"
 HAI_support_not_occupation_idea_desc:0 "The Caribbean mission operates within clearly defined Haitian limits and remains subordinate to national authorities."
 HAI_haitian_led_security_idea:0 "Haitian-Led Security Force"
 HAI_haitian_led_security_idea_desc:0 "International training and equipment are being transferred into permanent Haitian institutions."
 HAI_international_arms_interdiction:0 "International Arms Interdiction"
 HAI_international_arms_interdiction_desc:0 "Regional patrols and customs cooperation are disrupting the flow of weapons and ammunition into Haiti's armed networks."

 HAI_nation_on_the_brink:0 "A Nation on the Brink"
 HAI_nation_on_the_brink_desc:0 "The republic survives in scattered enclaves while rival armed groups control the roads between them."
 HAI_emergency_council_session:0 "Emergency Council Session"
 HAI_emergency_council_session_desc:0 "The Transitional Presidential Council must agree on a minimum program before the last state institutions disappear."
 HAI_secure_national_palace:0 "Secure the National Palace"
 HAI_secure_national_palace_desc:0 "The government district must be made defensible before any wider operation can begin."
 HAI_reorganize_pnh:0 "Reorganize the PNH"
 HAI_reorganize_pnh_desc:0 "The Haitian National Police needs a unified emergency command and dependable units."
 HAI_request_mss_reinforcements:0 "Request Emergency Security Aid"
 HAI_request_mss_reinforcements_desc:0 "Additional regional personnel and equipment could prevent the security perimeter from collapsing."
 HAI_protect_port:0 "Protect the Port"
 HAI_protect_port_desc:0 "Food, fuel and ammunition mean nothing if they cannot leave the docks safely."
 HAI_map_gang_networks:0 "Map the Armed Networks"
 HAI_map_gang_networks_desc:0 "Any successful operation requires an accurate picture of territorial commands and shifting alliances."
 HAI_state_of_siege:0 "Declare a State of Siege"
 HAI_state_of_siege_desc:0 "Emergency security powers will prepare the republic for a direct confrontation with the armed enclaves."
 HAI_delay_the_catastrophe:0 "Delay the Catastrophe"
 HAI_delay_the_catastrophe_desc:0 "Haiti cannot defeat every armed network today, but careful intelligence work can prevent them from dictating the pace of the crisis. Unlocks targeted counter-operations and grants one operation token."
 HAI_cultivate_confidential_informants:0 "Cultivate Confidential Informants"
 HAI_cultivate_confidential_informants_desc:0 "Witness protection, payments and extraction plans will make targeted operations more likely to succeed and provide a second operation token."
 HAI_buy_the_republic_time:0 "Buy the Republic Time"
 HAI_buy_the_republic_time_desc:0 "Every disrupted route and compromised command post gives the republic another week in which to rebuild."
 HAI_operation_port_au_prince:0 "Operation Port-au-Prince"
 HAI_operation_port_au_prince_desc:0 "The metropolitan belt and eastern approaches must be returned to government control."
 HAI_break_gran_grif:0 "Break Gran Grif"
 HAI_break_gran_grif_desc:0 "The Artibonite route cannot remain under the control of Gran Grif."
 HAI_restore_state_authority:0 "Restore State Authority"
 HAI_restore_state_authority_desc:0 "With the principal armed enclaves defeated, Haiti can begin rebuilding a single national administration."
 HAI_import_small_arms:0 "Import Small Arms"
 HAI_import_small_arms_desc:0 "Standardized weapons and ammunition are more valuable to Haiti than prestige equipment it cannot maintain."
 HAI_police_drones:0 "Police Reconnaissance Drones"
 HAI_police_drones_desc:0 "Commercial unmanned systems can provide basic reconnaissance over dangerous urban districts."
 HAI_motorize_rapid_response:0 "Motorize Rapid Response Units"
 HAI_motorize_rapid_response_desc:0 "Reliable vehicles are essential for reinforcing isolated police positions."
 HAI_expand_fadh:0 "Expand the FAd'H"
 HAI_expand_fadh_desc:0 "A small professional military can support the police without attempting to replace civilian government."
 HAI_clean_transition_council:0 "Clean the Transition Council"
 HAI_clean_transition_council_desc:0 "Corruption accusations and private bargains have destroyed public trust in the transition."
 HAI_restore_courts:0 "Restore the Courts"
 HAI_restore_courts_desc:0 "The state cannot claim legitimacy while justice exists only on paper."
 HAI_prepare_elections:0 "Prepare National Elections"
 HAI_prepare_elections_desc:0 "Secure regions can begin registering voters while the government works toward a credible national ballot."
 HAI_new_republic:0 "A New Haitian Republic"
 HAI_new_republic_desc:0 "The emergency transition will end with an elected constitutional government."
 HAI_empower_fadh:0 "Empower the FAd'H"
 HAI_empower_fadh_desc:0 "Civilian committees have failed to make timely decisions. The security command demands operational authority."
 HAI_martial_law:0 "Nationwide Martial Law"
 HAI_martial_law_desc:0 "Military administration will replace the remaining fragmented emergency authorities."
 HAI_national_directorate:0 "The National Directorate"
 HAI_national_directorate_desc:0 "Emergency command will become the permanent basis of the Haitian state."
 HAI_open_backchannels:0 "Open Backchannels"
 HAI_open_backchannels_desc:0 "Not every commander is equally committed to endless conflict, but negotiations carry a grave political cost."
 HAI_offer_local_amnesty:0 "Offer Conditional Amnesty"
 HAI_offer_local_amnesty_desc:0 "Lower-level fighters may disarm or enter supervised local units in exchange for limited amnesty."
 HAI_integrate_armed_committees:0 "Integrate Armed Committees"
 HAI_integrate_armed_committees_desc:0 "Local armed structures will be brought into a common chain of command, even if their past cannot simply be erased."
 HAI_government_national_salvation:0 "Government of National Salvation"
 HAI_government_national_salvation_desc:0 "A single coalition can stop the fighting, but it may institutionalize the very networks that destroyed the republic."
 HAI_caricom_appeal:0 "Appeal to CARICOM"
 HAI_caricom_appeal_desc:0 "Haiti's Caribbean partners can coordinate diplomatic, logistical and humanitarian assistance."
 HAI_return_security_council:0 "Return to the Security Council"
 HAI_return_security_council_desc:0 "The international community must be confronted with the consequences of abandoning Haiti."
 HAI_seek_regional_leader:0 "Seek a Regional Leader"
 HAI_seek_regional_leader_desc:0 "A Caribbean security mission needs a nearby state willing to provide its political leadership. Santo Domingo will be approached first."
 HAI_establish_cssm:0 "Establish the Caribbean Security Support Mission"
 HAI_establish_cssm_desc:0 "With a regional leader secured, the mission can move from diplomatic promises to a functioning command structure."
 HAI_joint_operations_command:0 "Joint Operations Command"
 HAI_joint_operations_command_desc:0 "Haitian officers and regional advisers will share intelligence and plan coordinated security operations."
 HAI_caribbean_logistics_network:0 "Caribbean Logistics Network"
 HAI_caribbean_logistics_network_desc:0 "Regional ports and airfields can maintain an emergency supply route into Port-au-Prince."
 HAI_enforce_arms_embargo:0 "Enforce the Arms Embargo"
 HAI_enforce_arms_embargo_desc:0 "The same maritime network supplying the government can be used to intercept weapons intended for armed groups."
 HAI_emergency_arms_airlift:0 "Emergency Arms Airlift"
 HAI_emergency_arms_airlift_desc:0 "As the crisis worsens, regional partners are finally prepared to release larger stocks of weapons and support equipment."
 HAI_region_cannot_look_away:0 "The Region Cannot Look Away"
 HAI_region_cannot_look_away_desc:0 "Haiti's collapse would not stop at its borders. The Caribbean must commit before the crisis consumes the island."
 HAI_deploy_caribbean_brigade:0 "Deploy the Caribbean Joint Security Brigade"
 HAI_deploy_caribbean_brigade_desc:0 "A seasoned regional infantry brigade will deploy under Haitian operational control as long as Port-au-Prince remains open."
 HAI_support_not_occupation:0 "Support, Not Occupation"
 HAI_support_not_occupation_desc:0 "Foreign assistance must strengthen Haitian sovereignty rather than replace it."
 HAI_foreign_control_ports:0 "Foreign Protection of the Ports"
 HAI_foreign_control_ports_desc:0 "International administrators can keep strategic imports moving, but sovereignty will be visibly compromised."
 HAI_haitian_led_security_force:0 "A Haitian-Led Security Force"
 HAI_haitian_led_security_force_desc:0 "The mission's training, planning and equipment will be transferred into a permanent national force."
 HAI_stabilization_at_any_cost:0 "Stabilization at Any Cost"
 HAI_stabilization_at_any_cost_desc:0 "Order will be restored under international supervision, regardless of the political humiliation."
 HAI_reopen_customs:0 "Reopen the Customs Service"
 HAI_reopen_customs_desc:0 "A functioning customs administration is the fastest route to restoring public revenue."
 HAI_humanitarian_corridors:0 "Humanitarian Corridors"
 HAI_humanitarian_corridors_desc:0 "Protected routes will reconnect isolated communities with food and medical aid."
 HAI_repair_power_grid:0 "Repair the Power Grid"
 HAI_repair_power_grid_desc:0 "Electricity must reach the regions still held by the government."
 HAI_rebuild_national_roads:0 "Rebuild National Roads"
 HAI_rebuild_national_roads_desc:0 "The republic cannot be reunited while its remaining territories are connected only by sea and air."
 HAI_ports_and_markets:0 "Ports and Regional Markets"
 HAI_ports_and_markets_desc:0 "Cap-Haïtien and Les Cayes can anchor recovery outside the capital."
 HAI_recovery_fund:0 "Create the Haitian Recovery Fund"
 HAI_recovery_fund_desc:0 "Centralized and monitored reconstruction spending can prevent emergency aid from disappearing into private networks."

 HAI_GANG_consolidate_territory:0 "Consolidate Our Territory"
 HAI_GANG_consolidate_territory_desc:0 "Local commanders must accept a single territorial authority."
 HAI_GANG_control_checkpoints:0 "Control the Checkpoints"
 HAI_GANG_control_checkpoints_desc:0 "Road access determines who can move, trade and govern."
 HAI_GANG_smuggled_rifles:0 "Expand the Weapons Network"
 HAI_GANG_smuggled_rifles_desc:0 "The armed groups depend on imported rifles and ammunition to sustain their territorial control."
 HAI_GANG_recruit_local_forces:0 "Recruit Local Forces"
 HAI_GANG_recruit_local_forces_desc:0 "More fighters can be drawn from the communities under our control."
 HAI_GANG_break_fragmented_command:0 "Break Fragmented Command"
 HAI_GANG_break_fragmented_command_desc:0 "Personal fiefdoms must give way to a unified command."
 VIV_unify_metropolitan_coalition:0 "Unify the Metropolitan Coalition"
 VIV_unify_metropolitan_coalition_desc:0 "Viv Ansanm must turn a temporary alliance into a durable urban command."
 VIV_seize_national_palace:0 "Seize the National Palace"
 VIV_seize_national_palace_desc:0 "The government enclave is the symbolic and practical obstacle to metropolitan domination."
 GRF_lock_down_artibonite:0 "Lock Down Artibonite"
 GRF_lock_down_artibonite_desc:0 "Gran Grif will eliminate the remaining challengers along the valley routes."
 GRF_march_on_the_capital:0 "March on the Capital"
 GRF_march_on_the_capital_desc:0 "Control of Artibonite is only a base from which to contest Haiti itself."
 KRB_secure_eastern_corridor:0 "Secure the Eastern Corridor"
 KRB_secure_eastern_corridor_desc:0 "Kraze Baryè will consolidate the communities east of Port-au-Prince."
 KRB_encircle_port_au_prince:0 "Encircle Port-au-Prince"
 KRB_encircle_port_au_prince_desc:0 "The capital enclave can be isolated from the east and south."
 HAI_GANG_destroy_the_rivals:0 "Destroy the Rival Networks"
 HAI_GANG_destroy_the_rivals_desc:0 "Only one armed coalition can dominate the country."
 HAI_GANG_claim_all_haiti:0 "Claim All of Haiti"
 HAI_GANG_claim_all_haiti_desc:0 "The organization will present itself as the sole national authority."
 HAI_GANG_criminal_hegemony:0 "A Criminal Hegemony"
 HAI_GANG_criminal_hegemony_desc:0 "Victory has created a coercive nationwide regime, but not a legitimate or functional state."

 hai_crisis.1.t:0 "Haiti at the Edge"
 hai_crisis.1.d:0 "On the first day of 2025, the Republic of Haiti controls only disconnected government strongholds. Viv Ansanm surrounds the capital district, Gran Grif dominates Artibonite, and Kraze Baryè holds the eastern approaches. The Transitional Presidential Council must choose between rebuilding constitutional authority, empowering the security forces, negotiating with armed groups, or surrendering more sovereignty to an international mission."
 hai_crisis.1.a:0 "The republic will not disappear."

 hai_crisis.2.t:0 "The Council Passes to Fritz Alphonse Jean"
 hai_crisis.2.d:0 "In accordance with the rotating presidency of the Transitional Presidential Council, Leslie Voltaire has handed the chair to Fritz Alphonse Jean. The institutions remain fragile, but the promised transfer has taken place."
 hai_crisis.2.a:0 "The transition continues."
 hai_crisis.3.t:0 "Laurent Saint-Cyr Assumes the Chair"
 hai_crisis.3.d:0 "The Transitional Presidential Council has completed another scheduled rotation. Laurent Saint-Cyr now speaks for a divided government facing an increasingly desperate national crisis."
 hai_crisis.3.a:0 "Another chairman, the same emergency."
 hai_crisis.20.t:0 "The Haitian War Begins"
 hai_crisis.20.d:0 "The final restraints have broken. Police positions, government roads and armed checkpoints have erupted into open battle. Viv Ansanm and Kraze Baryè coordinate their assault on the state while Gran Grif wages its own war from Artibonite. The uneasy standoff is over."
 hai_crisis.20.a:0 "Haiti will be decided by force."

 HAI_viv_ansanm_faction:0 "Viv Ansanm Alliance"

 HAI_haitian_crisis_category:0 "Haitian Crisis — Escalation: §R[?HAI.HAI_escalation|0]§!/100"
 HAI_haitian_crisis_category_desc:0 "The undeclared war is fought through raids, roadblocks and political pressure. At 100 escalation, the crisis becomes an open war."
 HAI_counter_operations_category:0 "Targeted Counter-Operations — Tokens: §Y[?HAI_counter_operation_tokens|0]§!"
 HAI_counter_operations_category_desc:0 "Counter-operation tokens represent rare intelligence opportunities. A successful operation suppresses one armed group's political and operational capacity for ninety days without weakening its frontline divisions."
 HAI_fracture_viv_command:0 "Fracture Viv Ansanm's Command"
 HAI_fracture_viv_command_desc:0 "Spend 150 infantry weapons and exploit rivalries inside the metropolitan coalition. Informants increase the chance of success from 60% to 75%."
 HAI_break_savien_supply_chain:0 "Break the Savien Supply Chain"
 HAI_break_savien_supply_chain_desc:0 "Spend 120 infantry weapons to raid couriers, caches and transport links supporting Gran Grif. Informants increase the chance of success from 60% to 75%."
 HAI_freeze_krb_ransom_channels:0 "Freeze the Ransom Channels"
 HAI_freeze_krb_ransom_channels_desc:0 "Spend 100 infantry weapons to seize intermediaries and trace cash moving through Kraze Baryè's network. Informants increase the chance of success from 60% to 75%."
 HAI_pnh_checkpoint_raids:0 "Raid Gang Checkpoints"
 HAI_pnh_checkpoint_raids_desc:0 "Targeted PNH operations may reopen local roads, although a failed raid will inflame the crisis. Each use raises the political-power cost of this response by §R5§!."
 HAI_protect_humanitarian_convoy:0 "Protect a Humanitarian Convoy"
 HAI_protect_humanitarian_convoy_desc:0 "Keeping food and medical supplies moving can reduce panic without beginning a wider offensive. Each use raises the political-power cost of this response by §R5§!."
 HAI_joint_intelligence_operation:0 "Launch a Joint Intelligence Operation"
 HAI_joint_intelligence_operation_desc:0 "Mapping commanders, safe houses and supply routes will allow the government to disrupt the armed networks. Each use raises the political-power cost of this response by §R5§!."
 HAI_GANG_assault_police_checkpoint:0 "Assault a Police Checkpoint"
 HAI_GANG_assault_police_checkpoint_desc:0 "A sudden assault will test the government's remaining security perimeter."
 HAI_GANG_block_national_road:0 "Block the National Road"
 HAI_GANG_block_national_road_desc:0 "Closing a major route will isolate government districts and increase pressure on the capital."
 HAI_GANG_raid_government_stockpiles:0 "Raid Government Stockpiles"
 HAI_GANG_raid_government_stockpiles_desc:0 "Government depots offer weapons and ammunition, but attacking them risks triggering open war."

 HAI_regional_support_category:0 "Regional Leadership Contest — Influence: [?HAI.HAI_regional_influence|0]"
 HAI_regional_support_category_desc:0 "Haiti pushes the current candidate toward leading the CSSM while all three armed groups pressure it toward neutrality. Haiti wins at +60; the armed groups win at -60."
 HAI_share_regional_intelligence:0 "Share Regional Intelligence"
 HAI_share_regional_intelligence_desc:0 "Demonstrating that Haiti can provide useful intelligence will strengthen the case for cooperation."
 HAI_offer_joint_border_patrols:0 "Offer Joint Border Patrols"
 HAI_offer_joint_border_patrols_desc:0 "A formal border-security arrangement would give the prospective mission leader a direct role in containing the crisis."
 HAI_appeal_to_regional_stability:0 "Appeal to Regional Stability"
 HAI_appeal_to_regional_stability_desc:0 "Haiti's collapse would create refugees, smuggling and violence across the Caribbean."
 HAI_GANG_bribe_border_guards:0 "Bribe Border Guards"
 HAI_GANG_bribe_border_guards_desc:0 "Corrupt officials can weaken support for intervention while preserving routes for men and weapons."
 HAI_GANG_sabotage_bilateral_talks:0 "Sabotage Bilateral Talks"
 HAI_GANG_sabotage_bilateral_talks_desc:0 "Threats and carefully placed intermediaries can make cooperation with Haiti appear too dangerous."
 HAI_GANG_threaten_regional_interests:0 "Threaten Regional Interests"
 HAI_GANG_threaten_regional_interests_desc:0 "Visible retaliation against foreign interests may frighten the candidate away, at the cost of escalating the crisis."

 HAI_regional_alternatives_category:0 "Search for an Alternative Partner"
 HAI_regional_alternatives_category_desc:0 "The previous candidate has refused to lead the mission. Haiti may approach one of the remaining Caribbean states; every new influence contest begins at zero."
 HAI_turn_to_jamaica:0 "Turn to Jamaica"
 HAI_turn_to_jamaica_desc:0 "Kingston possesses the regional experience and political weight to lead the mission, if Haiti can defeat gang pressure."
 HAI_turn_to_bahamas:0 "Turn to the Bahamas"
 HAI_turn_to_bahamas_desc:0 "Nassau may be willing to organize a smaller Caribbean coalition if presented with a convincing case."

 HAI_cssm_operations_category:0 "Caribbean Security Support Mission"
 HAI_cssm_operations_category_desc:0 "The CSSM coordinates regional intelligence and supplies under Haitian operational control. Its aid grows as the national emergency becomes more severe."
 HAI_request_cssm_reconnaissance:0 "Request CSSM Reconnaissance"
 HAI_request_cssm_reconnaissance_desc:0 "Regional surveillance and liaison teams can improve the government's picture of the fighting."
 HAI_request_emergency_cssm_supplies:0 "Request Emergency CSSM Supplies"
 HAI_request_emergency_cssm_supplies_desc:0 "The shipment will be larger if Haiti faces open war or severe escalation."
 HAI_intercept_arms_shipment:0 "Intercept an Arms Shipment"
 HAI_intercept_arms_shipment_desc:0 "Regional patrols have identified a shipment intended for Haiti's armed groups."

 hai_cssm.1.t:0 "Haiti Requests Regional Leadership"
 hai_cssm.1.d:0 "[FROM.GetNameDefCap] has overcome opposition from armed networks and asks us to lead the Caribbean Security Support Mission. Accepting would commit our reputation and resources to the survival of the Haitian state."
 hai_cssm.1.a:0 "We will lead the mission."
 hai_cssm.1.b:0 "The risk is still too great."
 hai_cssm.2.t:0 "Pressure Against Intervention"
 hai_cssm.2.d:0 "Haitian armed groups have threatened our interests, cultivated officials and warned of retaliation if we lead a security mission. The political case for remaining outside Haiti has become overwhelming."
 hai_cssm.2.a:0 "We will not intervene."
 hai_cssm.2.b:0 "Defy the pressure and lead the mission."
 hai_cssm.3.t:0 "A Regional Leader Secured"
 hai_cssm.3.d:0 "A Caribbean partner has formally accepted leadership of the proposed security mission. Haiti can now establish the CSSM and negotiate its operational structure."
 hai_cssm.3.a:0 "Turn the commitment into action."
 hai_cssm.4.t:0 "The Candidate Refuses"
 hai_cssm.4.d:0 "The current candidate has rejected the mission. Its officials have granted access to the armed networks, which celebrate the decision as proof that Haiti stands alone. Another regional partner must be found."
 hai_cssm.4.a:0 "Approach another capital."
 hai_cssm.5.t:0 "No Caribbean State Will Lead"
 hai_cssm.5.d:0 "Santo Domingo, Kingston and Nassau have all refused to assume responsibility for the mission. The Caribbean Security Support Mission has failed before its first deployment."
 hai_cssm.5.a:0 "Haiti stands alone."
 hai_cssm.6.t:0 "Talks Open with Jamaica"
 hai_cssm.6.d:0 "Haitian diplomats have arrived in Kingston to seek Jamaican leadership of the mission. Both the government and armed groups begin the new contest with no accumulated influence."
 hai_cssm.6.a:0 "Begin the Jamaican campaign."
 hai_cssm.7.t:0 "Talks Open with the Bahamas"
 hai_cssm.7.d:0 "Haiti has turned to Nassau in search of a final regional leader. Both the government and armed groups begin the new contest with no accumulated influence."
 hai_cssm.7.a:0 "Begin the Bahamian campaign."
 hai_cssm.8.t:0 "Santo Domingo Must Choose"
 hai_cssm.8.d:0 "The Dominican Republic is the natural first candidate to lead a regional mission. Haiti will offer intelligence and border cooperation while the armed groups use threats, corruption and smuggling ties to force Dominican neutrality."
 hai_cssm.8.a:0 "The contest for Santo Domingo begins."
 hai_cssm.9.t:0 "The Caribbean Joint Security Brigade Arrives"
 hai_cssm.9.d:0 "A seasoned regional brigade has landed in Port-au-Prince under Haitian operational control. Its four infantry battalions, engineers and support artillery will defend the capital as long as the international supply corridor remains open."
 hai_cssm.9.a:0 "Keep Port-au-Prince open."
 hai_cssm.20.t:0 "Port-au-Prince Has Fallen"
 hai_cssm.20.d:0 "The CSSM can no longer guarantee access to its headquarters and supply corridor. Regional governments have begun preparations to evacuate the brigade. Haiti has twenty-one days to restore control of the capital."
 hai_cssm.20.a:0 "Retake the capital before they leave."
 hai_cssm.21.t:0 "The Fate of the CSSM Mission"
 hai_cssm.21.d:0 "The twenty-one-day deadline has expired. If Port-au-Prince remains lost, the foreign command staff and personnel will evacuate while the mission's surviving Haitian auxiliaries are absorbed into local service."
 hai_cssm.21.a:0 "The capital is secure; the mission stays."
 hai_cssm.21.b:0 "Dissolve the mission and absorb its local remnants."

 hai_feedback.1.t:0 "Checkpoint Raids Succeed"
 hai_feedback.1.d:0 "PNH assault teams struck several isolated checkpoints before the armed groups could reinforce them. Two roads have reopened and local commanders report that the gangs are temporarily pulling back."
 hai_feedback.1.a:0 "Keep the roads open."
 hai_feedback.2.t:0 "Raid Meets Heavy Resistance"
 hai_feedback.2.d:0 "The checkpoint force was larger and better prepared than intelligence suggested. PNH units withdrew after taking casualties, while images of abandoned police vehicles spread across the capital."
 hai_feedback.2.a:0 "Pull the units back."
 hai_feedback.3.t:0 "The Convoy Gets Through"
 hai_feedback.3.d:0 "Police escorts cleared barricades ahead of a humanitarian convoy and kept armed groups away from the trucks. Food and medicine have reached clinics that had been cut off for days."
 hai_feedback.3.a:0 "Get the supplies distributed."
 hai_feedback.4.t:0 "The Intelligence Cell Reports"
 hai_feedback.4.d:0 "Analysts have combined police files, intercepted communications and local testimony into a new map of armed safe houses and supply routes. Several operations have been disrupted without a major firefight."
 hai_feedback.4.a:0 "Turn intelligence into action."
 hai_feedback.5.t:0 "A Police Checkpoint Is Overrun"
 hai_feedback.5.d:0 "Fighters loyal to [FROM.GetNameDef] launched a concentrated assault on a government checkpoint. The surviving police abandoned the position and the attackers paraded captured weapons through nearby streets. Escalation rises by 7."
 hai_feedback.5.a:0 "Reinforce the surviving positions."
 hai_feedback.6.t:0 "The National Road Is Blocked"
 hai_feedback.6.d:0 "Operatives linked to [FROM.GetNameDef] have erected barricades and firing positions along a major national road. Traffic has stopped and several government districts are once again isolated. Escalation rises by 9 and stability falls by 1%."
 hai_feedback.6.a:0 "Find another route."
 hai_feedback.7.t:0 "A Government Depot Is Raided"
 hai_feedback.7.d:0 "A force belonging to [FROM.GetNameDef] broke into a poorly defended government depot and escaped with rifles and ammunition. Haiti loses 100 infantry weapons and 125 manpower. The attackers lose 75 manpower, gain the captured weapons, and escalation rises by 10."
 hai_feedback.7.a:0 "Secure the remaining stockpiles."

 hai_feedback.20.t:0 "The Intelligence Dossier Is Well Received"
 hai_feedback.20.d:0 "Officials from [FROM.GetNameDef] describe the Haitian intelligence package as detailed and credible. Security planners now see cooperation with Port-au-Prince as an opportunity rather than an open-ended liability. Regional influence rises by 10."
 hai_feedback.20.a:0 "Build on their interest."
 hai_feedback.21.t:0 "The Patrol Proposal Gains Ground"
 hai_feedback.21.d:0 "The government of [FROM.GetNameDef] has opened formal discussions on joint border and maritime patrols. Senior officials argue that containing arms trafficking would serve their own national security as well as Haiti's. Regional influence rises by 12."
 hai_feedback.21.a:0 "Move the talks forward."
 hai_feedback.22.t:0 "The Regional Appeal Is Heard"
 hai_feedback.22.d:0 "Public figures and government ministers in [FROM.GetNameDef] have begun warning that a total Haitian collapse would affect the entire Caribbean. The argument for regional responsibility is gaining ground. Regional influence rises by 8."
 hai_feedback.22.a:0 "The region is listening."
 hai_feedback.23.t:0 "Border Officials Compromised"
 hai_feedback.23.d:0 "Investigators report that intermediaries connected to [FROM.GetNameDef] have paid border officials and local political brokers to oppose cooperation with Haiti. The candidate government has become more cautious. Regional influence falls by 5."
 hai_feedback.23.a:0 "Expose the network."
 hai_feedback.24.t:0 "Bilateral Talks Are Disrupted"
 hai_feedback.24.d:0 "Threatening messages, planted rumors and hostile demonstrations organized by [FROM.GetNameDef] have derailed a round of bilateral meetings. Officials in the candidate country now question whether the mission is politically sustainable. Regional influence falls by 7."
 hai_feedback.24.a:0 "Reopen the diplomatic channel."
 hai_feedback.25.t:0 "Regional Interests Are Threatened"
 hai_feedback.25.d:0 "[FROM.GetNameDefCap] has issued direct and indirect threats against commercial and diplomatic interests tied to the candidate country. The intimidation has weakened support for intervention while raising tensions inside Haiti. Regional influence falls by 8 and escalation rises by 3."
 hai_feedback.25.a:0 "We will not be intimidated."

 hai_feedback.30.t:0 "CSSM Reconnaissance Returns"
 hai_feedback.30.d:0 "Regional surveillance teams have delivered updated imagery and movement reports to Haitian commanders. The information improves operational planning and reassures the public that the mission is active. Haiti gains 4 Army Experience and 1% War Support."
 hai_feedback.30.a:0 "Distribute the intelligence."
 hai_feedback.31.t:0 "A Limited CSSM Shipment Arrives"
 hai_feedback.31.d:0 "The regional mission has delivered 200 infantry weapons from emergency reserves. The shipment is useful, but partner governments remain unwilling to release their larger stocks while the crisis remains contained."
 hai_feedback.31.a:0 "Every rifle matters."
 hai_feedback.32.t:0 "Emergency CSSM Stocks Released"
 hai_feedback.32.d:0 "With Haiti facing severe escalation or open war, regional governments have authorized a larger emergency shipment: 400 infantry weapons and 25 units of support equipment have arrived in Port-au-Prince."
 hai_feedback.32.a:0 "Send them to the front."
 hai_feedback.33.t:0 "Arms Shipment Intercepted"
 hai_feedback.33.d:0 "CSSM patrols have intercepted a shipment intended for Haiti's armed groups. The captured cargo adds 120 infantry weapons to government stocks and reduces escalation by 3."
 hai_feedback.33.a:0 "Turn their weapons against them."

 # Armed-group government restrictions and identities
 HAI_non_state_armed_group:0 "Non-State Armed Group"
 HAI_non_state_armed_group_desc:0 "This organization controls territory but does not possess the institutions of a functioning state. Political advisors, conscription changes, economic laws and trade laws cost 1000% more Political Power. The restriction is removed after the organization unifies Haiti."
 VIV_coalition_of_former_rivals:0 "Coalition of Former Rivals"
 VIV_coalition_of_former_rivals_desc:0 "Viv Ansanm combines networks whose old rivalries have not disappeared. Its reach brings fighters and political leverage, but weakens stability and battlefield cohesion."
 VIV_metropolitan_chokehold:0 "Metropolitan Chokehold"
 VIV_metropolitan_chokehold_desc:0 "Barricades, neighborhood lookouts and control of the capital's arteries make Viv Ansanm difficult to dislodge from metropolitan Haiti."
 VIV_unified_command:0 "Unified Viv Ansanm Command"
 VIV_unified_command_desc:0 "The coalition's competing commands have been subordinated to a coordinated metropolitan leadership."
 GRF_savien_stronghold:0 "The Savien Stronghold"
 GRF_savien_stronghold_desc:0 "Gran Grif's defensive network around Savien is difficult for isolated police formations to penetrate."
 GRF_artibonite_road_predation:0 "Predators of the Artibonite Roads"
 GRF_artibonite_road_predation_desc:0 "Road tolls, truck seizures and rural informants sustain Gran Grif while hollowing out the legal economy."
 GRF_elan_expanding_network:0 "Elan's Expanding Network"
 GRF_elan_expanding_network_desc:0 "Luckson Elan has transformed a rural stronghold into an organization capable of projecting force beyond Artibonite."
 KRB_ransom_economy:0 "The Ransom Economy"
 KRB_ransom_economy_desc:0 "Kidnapping, extortion and negotiated payments provide political resources at the cost of legitimacy and willing recruits."
 KRB_torcelle_tabarre_network:0 "The Torcelle-Tabarre Network"
 KRB_torcelle_tabarre_network_desc:0 "Safe houses, intermediaries and stolen vehicles connect Kraze Baryè positions along the eastern approaches to the capital."
 KRB_400_mawozo_partnership:0 "An Arrangement with 400 Mawozo"
 KRB_400_mawozo_partnership_desc:0 "Operational cooperation widens Kraze Baryè's reach, but another independent command further complicates battlefield coordination."

 # Expanded Viv Ansanm focus branch
 VIV_hold_coalition_together:0 "Hold Viv Ansanm Together"
 VIV_hold_coalition_together_desc:0 "The coalition cannot challenge the state while its constituent networks settle old disputes in the streets."
 VIV_truce_between_g9_and_gpep:0 "A Truce Between G-9 and G-Pèp"
 VIV_truce_between_g9_and_gpep_desc:0 "A practical division of territory can prevent the alliance from collapsing under the weight of its old rivalries."
 VIV_coordinate_neighborhood_bosses:0 "Coordinate the Neighborhood Bosses"
 VIV_coordinate_neighborhood_bosses_desc:0 "Local commanders will receive common targets, schedules and rules for dividing captured material."
 VIV_seize_police_arsenals:0 "Seize Police Arsenals"
 VIV_seize_police_arsenals_desc:0 "Isolated police stores contain the rifles needed for a sustained metropolitan campaign."
 VIV_open_prison_gates:0 "Open the Prison Gates"
 VIV_open_prison_gates_desc:0 "Breaking the state's detention system will produce recruits and chaos in equal measure."
 VIV_barricade_the_capital:0 "Barricade the Capital"
 VIV_barricade_the_capital_desc:0 "Layered roadblocks can turn every metropolitan avenue into a contested frontier."
 VIV_shut_down_airport_road:0 "Shut Down the Airport Road"
 VIV_shut_down_airport_road_desc:0 "Cutting the airport corridor will isolate government movements and demonstrate the coalition's reach."
 VIV_pressure_national_port:0 "Pressure the National Port"
 VIV_pressure_national_port_desc:0 "Control of the warehouses and port approaches would provide weapons while choking government imports."
 VIV_prepare_palace_assault:0 "Prepare the Palace Assault"
 VIV_prepare_palace_assault_desc:0 "The coalition will openly assemble for an offensive. Haiti will receive warning before the final operation begins."

 # Expanded Gran Grif focus branch
 GRF_fortify_savien:0 "Fortify Savien"
 GRF_fortify_savien_desc:0 "Savien must remain the protected center of Gran Grif's Artibonite network."
 GRF_expand_rural_network:0 "Expand the Rural Network"
 GRF_expand_rural_network_desc:0 "Informants and local enforcers can extend Gran Grif's reach beyond its fortified core."
 GRF_tax_route_nationale_one:0 "Tax Route Nationale No. 1"
 GRF_tax_route_nationale_one_desc:0 "Nothing will move through lower Artibonite without paying for passage."
 GRF_hijack_truck_routes:0 "Hijack the Truck Routes"
 GRF_hijack_truck_routes_desc:0 "Cargo moving between the capital and the north provides weapons, vehicles and bargaining power."
 GRF_weapons_from_port_au_prince:0 "Weapons from Port-au-Prince"
 GRF_weapons_from_port_au_prince_desc:0 "Smuggling contacts in the capital can feed arms into the Savien stronghold."
 GRF_old_political_connections:0 "Revive the Old Political Connections"
 GRF_old_political_connections_desc:0 "Former patrons and compromised officials still possess access that armed men alone cannot obtain."
 GRF_break_departmental_police:0 "Break the Departmental Police"
 GRF_break_departmental_police_desc:0 "A coordinated campaign will force the remaining Artibonite police positions to withdraw or surrender."
 GRF_control_saint_marc_corridor:0 "Control the Saint-Marc Corridor"
 GRF_control_saint_marc_corridor_desc:0 "Saint-Marc is the hinge between the Artibonite base and the road south."
 GRF_prepare_southern_march:0 "Prepare the Southern March"
 GRF_prepare_southern_march_desc:0 "Gran Grif will openly prepare its columns for a thirty-five-day drive toward the capital."

 # Expanded Kraze Barye focus branch
 KRB_entrench_torcelle:0 "Entrench Torcelle"
 KRB_entrench_torcelle_desc:0 "Torcelle's safe houses and approaches will form the secure center of the organization."
 KRB_build_tabarre_network:0 "Build the Tabarre Network"
 KRB_build_tabarre_network_desc:0 "Intermediaries, lookouts and vehicle crews will connect Kraze Baryè operations across Tabarre."
 KRB_professionalize_ransom_network:0 "Professionalize the Ransom Network"
 KRB_professionalize_ransom_network_desc:0 "Targets, guards and negotiators will be coordinated as a single revenue operation."
 KRB_negotiate_through_intermediaries:0 "Negotiate Through Intermediaries"
 KRB_negotiate_through_intermediaries_desc:0 "Reliable brokers can deliver demands while shielding the organization from direct exposure."
 KRB_expand_vehicle_theft_rings:0 "Expand the Vehicle Theft Rings"
 KRB_expand_vehicle_theft_rings_desc:0 "Stolen vehicles are transport, revenue and disguise at the same time."
 KRB_arrangement_with_400_mawozo:0 "An Arrangement with 400 Mawozo"
 KRB_arrangement_with_400_mawozo_desc:0 "A limited operational partnership can open routes and provide additional fighters without formally merging commands."
 KRB_open_eastern_smuggling_route:0 "Open the Eastern Smuggling Route"
 KRB_open_eastern_smuggling_route_desc:0 "The eastern corridor can bring weapons and supplies around government-controlled roads."
 KRB_infiltrate_local_authorities:0 "Infiltrate the Local Authorities"
 KRB_infiltrate_local_authorities_desc:0 "Officials who can be bribed or intimidated are more valuable than another exposed checkpoint."
 KRB_threaten_airport_corridor:0 "Threaten the Airport Corridor"
 KRB_threaten_airport_corridor_desc:0 "Pressure from the east can isolate the airport approaches and narrow the government's room to maneuver."
 KRB_prepare_eastern_encirclement:0 "Prepare the Eastern Encirclement"
 KRB_prepare_eastern_encirclement_desc:0 "Kraze Baryè will openly prepare a thirty-five-day operation against the capital."

 # Gang operation decisions
 HAI_GANG_hijack_coastal_shipment:0 "Hijack a Coastal Shipment"
 HAI_GANG_hijack_coastal_shipment_desc:0 "A gang controlling a coastal state can attack an incoming shipment. Haiti will lose convoys, manpower and weapons, but the attackers will also take casualties."
 GRF_hijack_coastal_shipment:0 "Hijack a Coastal Shipment"
 GRF_hijack_coastal_shipment_desc:0 "Gran Grif will use its Artibonite routes to intercept coastal cargo. A successful raid transfers government weapons but also costs fighters."
 VIV_call_coalition_council:0 "Call a Coalition Council"
 VIV_call_coalition_council_desc:0 "A meeting of network commanders can calm disputes before they damage the wider alliance."
 VIV_raise_metropolitan_barricades:0 "Raise Metropolitan Barricades"
 VIV_raise_metropolitan_barricades_desc:0 "New roadblocks will tighten the chokehold on government districts and raise escalation."
 VIV_shut_airport_access:0 "Shut Down Airport Access"
 VIV_shut_airport_access_desc:0 "Armed roadblocks along the airport approaches will disrupt government movement."
 VIV_seize_port_warehouses:0 "Seize Port Warehouses"
 VIV_seize_port_warehouses_desc:0 "A coordinated port raid offers a larger prize than an ordinary coastal interception."
 GRF_expand_savien_perimeter:0 "Expand the Savien Perimeter"
 GRF_expand_savien_perimeter_desc:0 "Additional positions around Savien will strengthen the organization while slightly increasing tension."
 GRF_extort_route_nationale_one:0 "Extort Route Nationale No. 1"
 GRF_extort_route_nationale_one_desc:0 "Drivers and merchants will pay for safe passage through Gran Grif territory."
 GRF_hijack_arms_truck:0 "Hijack an Arms Truck"
 GRF_hijack_arms_truck_desc:0 "An ambush can transfer government weapons directly into Gran Grif stocks."
 GRF_cut_saint_marc_road:0 "Cut the Saint-Marc Road"
 GRF_cut_saint_marc_road_desc:0 "Blocking the southern corridor will place further pressure on government supply routes."
 KRB_abduct_high_value_target:0 "Abduct a High-Value Target"
 KRB_abduct_high_value_target_desc:0 "Kraze Baryè will seize a valuable target and force Haiti to choose between payment, refusal and a rescue attempt."
 KRB_steal_vehicle_convoy:0 "Steal a Vehicle Convoy"
 KRB_steal_vehicle_convoy_desc:0 "A convoy ambush can transfer vehicles from the government to the organization at a cost in lives."
 KRB_extort_tabarre_businesses:0 "Extort Businesses in Tabarre"
 KRB_extort_tabarre_businesses_desc:0 "A new round of threats will generate Political Power while further weakening public confidence."
 KRB_coordinate_with_400_mawozo:0 "Coordinate with 400 Mawozo"
 KRB_coordinate_with_400_mawozo_desc:0 "Joint recruitment and weapons transfers provide immediate strength at the cost of internal cohesion."
 KRB_disrupt_airport_corridor:0 "Disrupt the Airport Corridor"
 KRB_disrupt_airport_corridor_desc:0 "Attacks and roadblocks east of the airport will increase pressure on Port-au-Prince."

 # Gang operation feedback events
 hai_gangs.1.t:0 "The Depot Raid Succeeds"
 hai_gangs.1.d:0 "Our fighters escaped with 100 government rifles. The operation cost us 75 manpower, while Haiti lost 125 manpower and the captured equipment. Escalation rises by 10."
 hai_gangs.1.a:0 "Distribute the captured weapons."
 hai_gangs.2.t:0 "A Coastal Shipment Is Hijacked"
 hai_gangs.2.d:0 "Gran Grif boats intercepted a government shipment off the Artibonite coast. Survivors report that several crates were carried inland before patrols reached the wreckage."
 hai_gangs.2.a:0 "Review the remaining shipping routes."
 hai_gangs.3.t:0 "The Coastal Raid Succeeds"
 hai_gangs.3.d:0 "The captured rifles have reached Artibonite through fishing ports and back roads. Losses were sustained, but the government cargo is now in our hands."
 hai_gangs.3.a:0 "Move the cargo inland."
 hai_gangs.10.t:0 "Viv Ansanm Prepares a Palace Assault"
 hai_gangs.10.d:0 "Intelligence reports that [FROM.GetNameDef] has begun openly assembling fighters and ammunition for an assault on the government enclave. The final preparations will take thirty-five days. Reducing escalation below 80 can disrupt the operation."
 hai_gangs.10.a:0 "We have thirty-five days."
 hai_gangs.11.t:0 "Gran Grif Prepares the Southern March"
 hai_gangs.11.d:0 "Intelligence reports that [FROM.GetNameDef] is assembling vehicles and fighters along the Artibonite roads for a march on Port-au-Prince. The final preparations will take thirty-five days. Reducing escalation below 80 can disrupt the operation."
 hai_gangs.11.a:0 "Break their preparations."
 hai_gangs.12.t:0 "Kraze Baryè Prepares an Encirclement"
 hai_gangs.12.d:0 "Intelligence reports that [FROM.GetNameDef] is preparing coordinated roadblocks and attacks along the eastern capital corridor. The final preparations will take thirty-five days. Reducing escalation below 80 can disrupt the operation."
 hai_gangs.12.a:0 "Keep the corridor open."
 hai_gangs.20.t:0 "The Coalition Council Meets"
 hai_gangs.20.d:0 "Representatives of the metropolitan networks have settled several territorial disputes and agreed on a temporary distribution of resources. The coalition is more stable for now."
 hai_gangs.20.a:0 "Unity is a weapon."
 hai_gangs.21.t:0 "New Barricades Across the Capital"
 hai_gangs.21.d:0 "Viv Ansanm crews erected reinforced barricades along several metropolitan arteries overnight. Police patrols attempting to reopen the roads met organized resistance."
 hai_gangs.21.a:0 "Map every roadblock."
 hai_gangs.22.t:0 "Airport Access Is Disrupted"
 hai_gangs.22.d:0 "Viv Ansanm positions now threaten the main airport approaches. A police column trying to establish an alternate route was forced to withdraw under fire."
 hai_gangs.22.a:0 "Secure an alternate route."
 hai_gangs.23.t:0 "Port Warehouses Are Raided"
 hai_gangs.23.d:0 "Viv Ansanm fighters struck warehouses serving the national port. Guards were overwhelmed and weapons disappeared into the metropolitan districts before reinforcements arrived."
 hai_gangs.23.a:0 "The port must be reinforced."
 hai_gangs.24.t:0 "Weapons Taken from the Port"
 hai_gangs.24.d:0 "The port operation secured a valuable rifle shipment. The coalition paid for it in casualties, but the cargo has already been divided among metropolitan commanders."
 hai_gangs.24.a:0 "Empty the warehouses quickly."
 hai_gangs.40.t:0 "Gran Grif Extorts the National Road"
 hai_gangs.40.d:0 "Gran Grif checkpoints are collecting payments from vehicles using Route Nationale No. 1. Trade is slowing and merchants increasingly treat the gang's receipts as the only documents that matter."
 hai_gangs.40.a:0 "Document every illegal checkpoint."
 hai_gangs.41.t:0 "A Government Arms Truck Is Hijacked"
 hai_gangs.41.d:0 "Gran Grif ambushed a government arms truck in Artibonite. Police reinforcements arrived too late to prevent the cargo from being carried toward Savien."
 hai_gangs.41.a:0 "Change the convoy procedures."
 hai_gangs.42.t:0 "The Arms Truck Is Ours"
 hai_gangs.42.d:0 "Our fighters secured the government rifles from the ambushed truck. The captured cargo is intact and has reached the Savien network."
 hai_gangs.42.a:0 "Send the rifles to Savien."
 hai_gangs.43.t:0 "The Saint-Marc Road Is Cut"
 hai_gangs.43.d:0 "Gran Grif roadblocks and ambush positions have cut traffic through the Saint-Marc corridor. A government attempt to reopen the road ended in a costly withdrawal."
 hai_gangs.43.a:0 "The road must be reopened."
 hai_gangs.60.t:0 "Kraze Baryè Seizes a High-Value Target"
 hai_gangs.60.d:0 "Kraze Baryè has abducted a prominent figure travelling through the eastern capital corridor. Intermediaries have delivered a ransom demand and warned against police intervention."
 hai_gangs.60.a:0 "Pay the ransom."
 hai_gangs.60.b:0 "Refuse their demand."
 hai_gangs.60.c:0 "Launch a rescue operation."
 hai_gangs.61.t:0 "A Vehicle Convoy Is Stolen"
 hai_gangs.61.d:0 "Kraze Baryè ambushed a government vehicle convoy east of the capital. Drivers and police escorts were caught between prepared positions while the surviving vehicles were taken away."
 hai_gangs.61.a:0 "Track the stolen vehicles."
 hai_gangs.62.t:0 "The Vehicles Are Secured"
 hai_gangs.62.d:0 "Our crews escaped with the government vehicles. Losses were sustained in the ambush, but the convoy can now support operations across the eastern corridor."
 hai_gangs.62.a:0 "Change the plates and markings."
 hai_gangs.63.t:0 "Businesses in Tabarre Are Extorted"
 hai_gangs.63.d:0 "Kraze Baryè intermediaries have delivered threats to businesses across Tabarre. Shops are paying for protection while witnesses refuse to approach the police."
 hai_gangs.63.a:0 "Offer protection to those who testify."
 hai_gangs.64.t:0 "The Airport Corridor Is Disrupted"
 hai_gangs.64.d:0 "Kraze Baryè attacks and roadblocks have disrupted traffic east of the airport. Security forces clearing the route encountered prepared firing positions."
 hai_gangs.64.a:0 "Clear the corridor."
 hai_gangs.65.t:0 "Haiti Pays the Ransom"
 hai_gangs.65.d:0 "The Haitian government accepted the demand. The payment confirms the value of the ransom network and replenishes its political resources."
 hai_gangs.65.a:0 "Release the target through an intermediary."
 hai_gangs.66.t:0 "Haiti Refuses the Demand"
 hai_gangs.66.d:0 "The government refused to make a payment. The immediate operation produced no ransom, but the crisis has inflicted casualties, damaged public confidence and raised escalation."
 hai_gangs.66.a:0 "There will be other targets."
 hai_gangs.67.t:0 "The Rescue Operation Succeeds"
 hai_gangs.67.d:0 "A Haitian police team located the holding site and extracted the captive. Our guards lost 100 manpower and the failed kidnapping has reduced escalation."
 hai_gangs.67.a:0 "Abandon the exposed safe houses."
 hai_gangs.68.t:0 "The Rescue Operation Fails"
 hai_gangs.68.d:0 "The Haitian assault was detected before reaching the captive. The failed operation produced additional leverage and strengthened the ransom network."
 hai_gangs.68.a:0 "Move before reinforcements arrive."

 # Gonâve development focuses and ideas
 HAI_build_hotels_on_gonave:0 "Build Hotels on Gonâve Island"
 HAI_build_hotels_on_gonave_desc:0 "With stability returning, the government can turn Gonâve into a showcase for reconstruction. Building hotels will create a civilian factory, but the unfinished development consumes scarce goods and creates a tempting target for armed groups."
 HAI_open_gonave_to_tourism:0 "Open Gonâve to Tourism"
 HAI_open_gonave_to_tourism_desc:0 "A secure ferry route and completed hotels can bring foreign visitors back to Haitian waters. Tourism will repay the cost of development and give the public a rare sign of normality."
 HAI_gonave_hotels:0 "Gonâve Hotel Development"
 HAI_gonave_hotels_desc:0 "Construction crews, imported fittings and public guarantees are consuming resources while Gonâve's hotel district is built."
 HAI_gonave_tourism:0 "Gonâve Tourism Revenue"
 HAI_gonave_tourism_desc:0 "Visitors, ferry traffic and new local businesses are returning more to the economy than the development program costs."
 HAI_gonave_construction_abandoned:0 "Abandoned Gonâve Construction Sites"
 HAI_gonave_construction_abandoned_desc:0 "Raids on hotel construction sites have driven away contractors, stranded materials and cast doubt on the entire project."
 HAI_gonave_tourism_panic:0 "Panic in the Gonâve Tourism Sector"
 HAI_gonave_tourism_panic_desc:0 "The robbery of foreign visitors has emptied ferries and hotel rooms while emergency security measures burden the economy."
 HAI_gonave_resorts_burning:0 "The Gonâve Resorts Are Burning"
 HAI_gonave_resorts_burning_desc:0 "Images of burning hotels have destroyed confidence in the island and forced the government to redirect industrial resources toward recovery."

 # Gonâve security minigame
 HAI_gonave_security_category:0 "Gonâve Security — [?HAI.HAI_gonave_security|0]/3"
 HAI_gonave_security_category_desc:0 "Haiti can spend rifles to protect Gonâve. Armed groups must first open a §YBreach§!, then exploit it with a follow-up operation. Security 0/1/2/3 gives a gang raid an 80%/55%/30%/10% chance of success."
 HAI_reinforce_gonave_guard:0 "Reinforce the Gonâve Guard"
 HAI_reinforce_gonave_guard_desc:0 "Send 180 infantry weapons to the island and raise Gonâve Security by one level."
 HAI_escort_gonave_ferries:0 "Escort the Gonâve Ferries"
 HAI_escort_gonave_ferries_desc:0 "Arm ferry escorts and patrol the approaches to the island. Costs 120 infantry weapons and raises Gonâve Security by one level."
 HAI_fund_gonave_local_watch:0 "Fund the Gonâve Local Watch"
 HAI_fund_gonave_local_watch_desc:0 "After two raids have been repelled, island residents can form a permanent watch. It costs 450 infantry weapons, but future reinforcements become cheaper."
 HAI_reinforce_gonave_local_watch:0 "Reinforce the Local Watch"
 HAI_reinforce_gonave_local_watch_desc:0 "Send 120 infantry weapons to the established local watch and raise Gonâve Security by one level."
 HAI_restore_confidence_in_gonave:0 "Restore Confidence in Gonâve"
 HAI_restore_confidence_in_gonave_desc:0 "Secure damaged sites, restore ferry service and reassure investors. Costs 60 infantry weapons, removes current raid disruption and grants 1% stability."
 HAI_GANG_raid_gonave:0 "Infiltrate Gonâve Island"
 HAI_GANG_raid_gonave_desc:0 "Organize a major landing against the island guard. The result event applies real casualties and equipment losses; success opens a temporary §YBreach§! for one follow-up operation."
 HAI_GANG_loot_gonave_hotel_sites:0 "Loot the Gonâve Hotel Sites"
 HAI_GANG_loot_gonave_hotel_sites_desc:0 "Exploit an open breach before tourism begins. The result event applies casualties, captures support equipment and disrupts Haitian construction."
 HAI_GANG_rob_gonave_tourists:0 "Rob Gonâve's Tourists"
 HAI_GANG_rob_gonave_tourists_desc:0 "Use the breach to hold up ferries and hotel guests. The result event applies casualties, produces political resources and damages Haiti's stability and regional standing."
 HAI_GANG_burn_gonave_resorts:0 "Burn the Gonâve Resorts"
 HAI_GANG_burn_gonave_resorts_desc:0 "Turn the island's showcase project into a column of smoke. The result event applies casualties and inflicts a severe stability and industrial penalty on Haiti."

 # Gonâve events
 hai_gonave.1.t:0 "The Island Across the Bay"
 hai_gonave.1.d:0 "The map of armed networks contains a warning beyond the capital: smugglers are sounding out fishermen, ferry crews and isolated coves on Gonâve. The island is quiet today, but any major investment there will attract men who see every hotel and supply boat as a future prize."
 hai_gonave.1.a:0 "Send 180 rifles and organize a guard."
 hai_gonave.1.b:0 "The capital must come first."
 hai_gonave.2.t:0 "Foundations on Gonâve"
 hai_gonave.2.d:0 "Concrete mixers and construction barges have arrived on Gonâve. A civilian workshop now supports the hotel project, and local families are opening shops around the new sites. For the moment the program consumes more than it earns—but the island finally has something to build toward."
 hai_gonave.2.a:0 "Let the cranes become a promise."
 hai_gonave.3.t:0 "The First Ferry of the Season"
 hai_gonave.3.d:0 "The morning ferry crossed the bay with every seat occupied. Visitors stepped onto the renovated pier beneath Haitian flags, while hotel staff and market traders lined the road inland. Tourism revenue now outweighs the cost of development, and the country has gained a small but visible victory over despair."
 hai_gonave.3.a:0 "Welcome them to Gonâve."
 hai_gonave.4.t:0 "More Rifles Reach Gonâve"
 hai_gonave.4.d:0 "Crates of rifles have been unloaded under guard and distributed among the island's security posts. Patrols now cover more of the coast, though every shipment sent across the bay is equipment the capital cannot use."
 hai_gonave.4.a:0 "The island will not be left open."
 hai_gonave.5.t:0 "Armed Escorts on the Ferry Route"
 hai_gonave.5.d:0 "Government launches now shadow ferries through the narrow approaches to Gonâve. Crews report suspicious boats turning away before they reach the shipping lane, and the island guard has gained precious time to prepare."
 hai_gonave.5.a:0 "Keep the route moving."
 hai_gonave.10.t:0 "A Breach on Gonâve"
 hai_gonave.10.d:0 "Fighters belonging to [FROM.GetNameDef] landed before dawn and overran an isolated security post. The attackers now have a temporary opening for a larger operation against the island."
 hai_gonave.10.a:0 "Seal the coast before they return."
 hai_gonave.11.t:0 "The Gonâve Landing Succeeds"
 hai_gonave.11.d:0 "Our boats reached an unguarded cove before dawn. The island post fell quickly and the surviving fighters opened a temporary breach that can be exploited against the hotels or their visitors."
 hai_gonave.11.a:0 "Choose the real target."
 hai_gonave.12.t:0 "The Gonâve Guard Holds"
 hai_gonave.12.d:0 "Lookouts spotted boats belonging to [FROM.GetNameDef] before they reached shore. The island guard met the landing force in the shallows and drove it back before a beachhead could be established."
 hai_gonave.12.a:0 "Count the boats that did not return."
 hai_gonave.13.t:0 "Thrown Back into the Bay"
 hai_gonave.13.d:0 "The Gonâve guard was waiting at the landing point. Our force withdrew after severe losses and no breach was opened. The island's defenses have been bloodied, but they still stand."
 hai_gonave.13.a:0 "There will be another crossing."
 hai_gonave.20.t:0 "The Hotel Sites Are Stripped"
 hai_gonave.20.d:0 "[FROM.GetNameDef] exploited the breach on Gonâve and emptied hotel construction sites before security forces arrived. Generators, tools and imported fittings vanished into fishing boats while contractors abandoned the island."
 hai_gonave.20.a:0 "Recover whatever they left behind."
 hai_gonave.21.t:0 "Everything Not Bolted Down"
 hai_gonave.21.d:0 "Our crews stripped the Gonâve hotel sites of generators, tools and valuable supplies. Haiti's showcase project now looks abandoned."
 hai_gonave.21.a:0 "Sell the tools and hide the generators."
 hai_gonave.30.t:0 "The Night the Ferries Stopped"
 hai_gonave.30.d:0 "Gunmen from [FROM.GetNameDef] used the breach to stop vehicles leaving the Gonâve ferry terminal and rob hotel guests at gunpoint. Foreign warnings spread before sunrise as visitors fled the island."
 hai_gonave.30.a:0 "Get every visitor off the island."
 hai_gonave.31.t:0 "The Tourists Pay"
 hai_gonave.31.d:0 "Our fighters surrounded the ferry road and emptied wallets, hotel safes and transport offices before withdrawing. The operation proved that Haiti cannot protect its own showcase."
 hai_gonave.31.a:0 "Let the story travel farther than the loot."
 hai_gonave.40.t:0 "Smoke Above the Resorts"
 hai_gonave.40.d:0 "The horizon turned orange as [FROM.GetNameDef] set fire to Gonâve's hotels, service buildings and construction stores. Guests crowded onto the last ferries while footage of the fires reached every regional capital."
 hai_gonave.40.a:0 "The island is burning."
 hai_gonave.41.t:0 "A Message Written in Smoke"
 hai_gonave.41.d:0 "Our force reached the resort district and burned the hotels that Port-au-Prince called proof of recovery. The flames delivered a strategic humiliation no communiqué could match."
 hai_gonave.41.a:0 "Let the capital watch the horizon."
 hai_gonave.50.t:0 "Gonâve Refuses to Be Abandoned"
 hai_gonave.50.d:0 "After surviving repeated landings, fishermen, ferry workers and hotel staff have volunteered for a permanent island watch. The government has supplied 450 rifles and a simple radio network. Local knowledge will now make every future reinforcement cheaper."
 hai_gonave.50.a:0 "The first alarm belongs to the islanders."
 hai_gonave.51.t:0 "The Hotels Reopen"
 hai_gonave.51.d:0 "Security teams have cleared abandoned sites, repaired the ferry terminal and escorted contractors back to Gonâve. The immediate economic disruption has ended, and the public response gives the government a small gain in stability."
 hai_gonave.51.a:0 "Turn the lights back on."
 hai_gonave.60.t:0 "Gonâve Is Lost"
 hai_gonave.60.d:0 "Government officials and hotel staff have fled Gonâve as hostile forces take control of the island. Hotel development and tourism benefits are suspended, and the security network has collapsed."
 hai_gonave.60.a:0 "The bay now divides us."
 hai_gonave.61.t:0 "The Flag Returns to Gonâve"
 hai_gonave.61.d:0 "Haitian forces have restored government control over Gonâve. Hotel development and tourism can resume, but the destroyed island security network must be rebuilt from zero."
 hai_gonave.61.a:0 "Reopen the ferry route."

