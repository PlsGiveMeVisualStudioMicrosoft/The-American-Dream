 # Additional gang after-action reports
 hai_gangs.25.t:0 "The Barricade Network Holds"
 hai_gangs.25.d:0 "Metropolitan commanders report that the new barricades diverted police traffic and forced the government to expose additional patrols. The coalition has paid casualties, but the pressure is visible."
 hai_gangs.25.a:0 "Hold every intersection."
 hai_gangs.26.t:0 "The Airport Road Is Choked"
 hai_gangs.26.d:0 "Government movement toward the airport has slowed to guarded convoys. Our positions took losses, but the corridor is no longer secure."
 hai_gangs.26.a:0 "Keep the road under observation."
 hai_gangs.44.t:0 "Tolls Collected on Route Nationale No. 1"
 hai_gangs.44.d:0 "Drivers and merchants paid Gran Grif checkpoints rather than risk losing their vehicles. The proceeds have been distributed through the Artibonite network."
 hai_gangs.44.a:0 "The road pays for itself."
 hai_gangs.45.t:0 "The Saint-Marc Corridor Closes"
 hai_gangs.45.d:0 "Government traffic has withdrawn from the prepared ambush positions. Gran Grif suffered casualties, but the corridor remains under pressure."
 hai_gangs.45.a:0 "Watch every approach."
 hai_gangs.69.t:0 "Tabarre Pays"
 hai_gangs.69.d:0 "Threatened businesses have delivered payments through trusted intermediaries. The ransom network has gained resources without exposing a major force."
 hai_gangs.69.a:0 "Keep the collectors moving."
 hai_gangs.70.t:0 "Traffic Abandons the Airport Corridor"
 hai_gangs.70.d:0 "The government route east of the airport has become a chain of guarded detours. Our fighters took losses, but the disruption is undeniable."
 hai_gangs.70.a:0 "Move before the police return."

 # Delay the Catastrophe and targeted operations
 hai_gangs.99.t:0 "A Narrow Window"
 hai_gangs.99.d:0 "Police analysts have identified fragile links inside each armed network. Haiti possesses the resources for only a limited number of major counter-operations. The government must choose where a temporary collapse in enemy coordination will buy the most time."
 hai_gangs.99.a:0 "Prepare the first target package."
 hai_gangs.100.t:0 "Viv Ansanm's Command Fractures"
 hai_gangs.100.d:0 "Selected arrests and carefully planted evidence have turned metropolitan commanders against one another. The coalition's fighters still hold their positions, but its leadership cannot coordinate a major operation."
 hai_gangs.100.a:0 "Use the breathing room."
 hai_gangs.101.t:0 "The Informants Were Exposed"
 hai_gangs.101.d:0 "Viv Ansanm identified the police approach before the arrests began. Informants disappeared, officers entered an ambush and the coalition now displays captured documents as proof of government weakness."
 hai_gangs.101.a:0 "Recover whoever remains."
 hai_gangs.102.t:0 "The Savien Supply Chain Breaks"
 hai_gangs.102.d:0 "Mobile police posts intercepted couriers and forced Gran Grif to abandon several caches. Savien remains defended, but its wider road network is temporarily too exposed for large raids."
 hai_gangs.102.a:0 "Keep the roads watched."
 hai_gangs.103.t:0 "Gran Grif Turns the Ambush"
 hai_gangs.103.d:0 "Gran Grif fed false information to the operation and struck the police column on an exposed road. The Savien network remains active and the failed raid has strengthened its reputation."
 hai_gangs.103.a:0 "Withdraw before the second ambush."
 hai_gangs.104.t:0 "The Ransom Channels Freeze"
 hai_gangs.104.d:0 "Intermediaries have been detained, cash routes traced and several safe houses abandoned. Kraze Baryè remains armed, but its ransom machine cannot finance another major operation for now."
 hai_gangs.104.a:0 "Follow every account."
 hai_gangs.105.t:0 "The Money Trail Was Bait"
 hai_gangs.105.d:0 "Kraze Baryè anticipated the seizures and emptied the targeted safe houses. A police team was attacked during withdrawal while the gang used the failure to frighten remaining intermediaries into obedience."
 hai_gangs.105.a:0 "Close the compromised files."
 hai_gangs.106.t:0 "The Coalition Turns Inward"
 hai_gangs.106.d:0 "Arrests and accusations have forced Viv Ansanm's commanders to focus on internal survival. Frontline positions remain intact, but large operations are suspended."
 hai_gangs.106.a:0 "Find who betrayed the meetings."
 hai_gangs.107.t:0 "The Roads Are Watched"
 hai_gangs.107.d:0 "Couriers and truck crews are abandoning exposed routes around Savien. Gran Grif remains armed, but material operations must wait until new paths are found."
 hai_gangs.107.a:0 "Move the caches again."
 hai_gangs.108.t:0 "Intermediaries Disappear"
 hai_gangs.108.d:0 "Brokers and money handlers have gone into hiding after coordinated police seizures. Kraze Baryè's fighters remain in place, but the ransom network has seized up."
 hai_gangs.108.a:0 "Rebuild the channels quietly."

 # Gonâve second-stage development and Port-au-Prince harbor
 HAI_restore_port_au_prince_harbor:0 "Restore the Port-au-Prince Harbor"
 HAI_restore_port_au_prince_harbor_desc:0 "The capital cannot survive on improvised landing points forever. Reopening a proper naval base will secure customs traffic, relief shipments and the government's connection to the Caribbean."
 HAI_gonave_development_authority:0 "Establish the Gonâve Development Authority"
 HAI_gonave_development_authority_desc:0 "Hotels alone cannot transform the island. A permanent authority will coordinate surveys, contractors and security while allowing Haiti to choose which expensive project comes next."
 HAI_chart_gonave_waters:0 "Chart Gonâve's Waters"
 HAI_chart_gonave_waters_desc:0 "Geological reports point to offshore hydrocarbon deposits around the Gulf of Gonâve. A serious survey can determine whether a national resource program is worth the enormous cost."
 HAI_gonave_maritime_corridor:0 "Create the Gonâve Maritime Corridor"
 HAI_gonave_maritime_corridor_desc:0 "An airport, protected harbor and local shipyards could turn the island from an isolated resort into Haiti's western transport hub."

 HAI_gonave_development_category:0 "Gonâve Development Projects"
 HAI_gonave_development_category_desc:0 "Major island projects consume a large share of Haiti's civilian economy while active. Only one can be undertaken at a time, but completed infrastructure permanently strengthens Gonâve."
 HAI_invest_in_gonave_resources:0 "Invest in National Resources"
 HAI_invest_in_gonave_resources_desc:0 "Commit the civilian economy to a seventy-day offshore survey and drilling program. During the project, §YConsumer Goods Factories factor§! rises by §R65%§!. Completion adds §Y3 Oil§! to Gonâve and unlocks national fuel programs."
 HAI_develop_gonave_shipyards:0 "Develop Gonâve Shipyards"
 HAI_develop_gonave_shipyards_desc:0 "Build a modest repair and construction yard over ninety days. The project burdens consumer production, but completion adds one §YNaval Dockyard§! and a permanent maritime-industry bonus."
 HAI_build_gonave_airport:0 "Build Gonâve Airport"
 HAI_build_gonave_airport_desc:0 "An eighty-day construction program will connect the island directly to regional visitors and emergency flights. Completion adds one §YAir Base§! level and improves tourism revenue."
 HAI_build_gonave_deepwater_harbor:0 "Build the Gonâve Deepwater Harbor"
 HAI_build_gonave_deepwater_harbor_desc:0 "A hundred-day harbor project will replace improvised ferry landings with a protected port. Completion adds one §YNaval Base§! level and improves tourism and dockyard output."

 HAI_gonave_resource_investment:0 "National Resource Mobilization"
 HAI_gonave_resource_investment_desc:0 "Survey ships, imported drilling equipment and public guarantees have absorbed nearly every civilian resource the government can redirect."
 HAI_gonave_heavy_construction:0 "Gonâve Heavy Construction"
 HAI_gonave_heavy_construction_desc:0 "Concrete, steel and skilled labor are being diverted across the bay to complete a major island industrial project."
 HAI_gonave_transport_construction:0 "Gonâve Transport Construction"
 HAI_gonave_transport_construction_desc:0 "The government is financing runways, quays and access roads while normal civilian demand is forced to wait."
 HAI_gonave_shipyards:0 "Gonâve Maritime Workshops"
 HAI_gonave_shipyards_desc:0 "Local repair slips and trained crews now service ferries, patrol craft and commercial vessels while creating a new source of island employment."
 HAI_gonave_air_links:0 "Caribbean Air Links"
 HAI_gonave_air_links_desc:0 "Direct regional flights bring visitors and urgent cargo to Gonâve without forcing every journey through the capital."
 HAI_gonave_deepwater_harbor:0 "Gonâve Deepwater Harbor"
 HAI_gonave_deepwater_harbor_desc:0 "A protected harbor has expanded ferry traffic, reduced transport costs and made the island's tourism economy easier to sustain."

 hai_gonave.70.t:0 "The Hotels Stand on Their Own"
 hai_gonave.70.d:0 "Three years after the first construction barges arrived, Gonâve's hotels no longer depend on emergency guarantees and imported fittings. Private revenue now covers ordinary maintenance, ending the development program's burden on Haitian consumers."
 hai_gonave.70.a:0 "End the public guarantees."
 hai_gonave.71.t:0 "The Capital Faces the Sea Again"
 hai_gonave.71.d:0 "Harbor pilots have guided the first government vessel into the restored facilities at Port-au-Prince. Customs officers, relief coordinators and naval crews now work from a permanent base instead of improvised wharves."
 hai_gonave.71.a:0 "Keep the harbor open."
 hai_gonave.72.t:0 "An Authority for the Island"
 hai_gonave.72.d:0 "Engineers, hotel owners, local officials and security officers have taken their seats inside the new Gonâve Development Authority. Its first meeting produced more demands than money—but for the first time, the island has a plan beyond the next ferry season."
 hai_gonave.72.a:0 "Choose the next investment carefully."
 hai_gonave.73.t:0 "Reports from the Gulf"
 hai_gonave.73.d:0 "Surveyors have assembled old geological reports, fishermen's observations and new seabed readings. The evidence is promising enough to justify a national resource project, but extraction will demand a brutal concentration of civilian resources."
 hai_gonave.73.a:0 "Prepare the investment decision."
 hai_gonave.74.t:0 "Gonâve's Maritime Blueprint"
 hai_gonave.74.d:0 "A new blueprint links an island airport, a protected harbor and small shipyards into a single transport corridor. Haiti cannot build every component at once, but each completed project will make the next one more believable."
 hai_gonave.74.a:0 "Open the project files."
 hai_gonave.75.t:0 "Every Resource to the Survey"
 hai_gonave.75.d:0 "Imported drilling equipment now crowds the quays while survey crews work around the clock. Civilian ministries have been ordered to release vehicles, fuel and foreign currency for seventy days."
 hai_gonave.75.a:0 "The country will feel every day of it."
 hai_gonave.76.t:0 "Keels on the Beach"
 hai_gonave.76.d:0 "Workers have cleared a strip of shoreline for slips, workshops and storage sheds. For now the project consumes far more than it produces, but the outlines of a Haitian maritime industry are visible."
 hai_gonave.76.a:0 "Keep the welders supplied."
 hai_gonave.77.t:0 "A Runway Across the Island"
 hai_gonave.77.d:0 "Graders and concrete crews are cutting an airfield into Gonâve's interior. Local roads are crowded with construction traffic as the government races to connect the island to the wider Caribbean."
 hai_gonave.77.a:0 "Clear the approach."
 hai_gonave.78.t:0 "The Harbor Works Begin"
 hai_gonave.78.d:0 "Dredgers have entered the bay and the first breakwater stones are being placed. Ferry operators endure delays while Haiti builds a port meant to survive both storms and political isolation."
 hai_gonave.78.a:0 "Build beyond the next season."
 hai_gonave.80.t:0 "Oil Beneath Haitian Waters"
 hai_gonave.80.d:0 "The survey has confirmed commercially useful deposits and the first production platforms are feeding a small but steady flow of oil into Haitian storage. The seventy-day mobilization is over; Gonâve now holds a strategic resource of its own."
 hai_gonave.80.a:0 "Three units of oil belong to Haiti."
 hai_gonave.81.t:0 "The Gonâve Yards Open"
 hai_gonave.81.d:0 "The first repaired ferry has left the new slips under its own power. Workshops that began as a temporary construction camp now form a permanent dockyard employing island welders, mechanics and carpenters."
 hai_gonave.81.a:0 "Launch the next hull."
 hai_gonave.82.t:0 "The First Flight to Gonâve"
 hai_gonave.82.d:0 "A regional passenger aircraft has touched down on the completed runway. The terminal is modest, but direct flights immediately shorten the journey for visitors and give the island an emergency link independent of the ferries."
 hai_gonave.82.a:0 "Welcome them by air."
 hai_gonave.83.t:0 "A Harbor Behind the Breakwater"
 hai_gonave.83.d:0 "Ferries and patrol craft now enter Gonâve through a protected channel. The deepwater harbor cuts transport losses, supports the island's workshops and makes every hotel room easier to supply."
 hai_gonave.83.a:0 "The island has a real port."

 HAI_escalation_increase_8_tt:0 "Haitian Crisis Escalation: §R+8§!"

 # Five-stage Gonâve petroleum development
 HAI_expand_gonave_offshore_platforms:0 "Expand the Gonâve Offshore Platforms"
 HAI_expand_gonave_offshore_platforms_desc:0 "Commit §Y75 Political Power§! and §Y90 days§! to extend the first field. The project imposes §R+65% Consumer Goods Factories factor§! and adds §Y3 Oil§! on completion."
 HAI_begin_gonave_deepwater_drilling:0 "Begin Gonâve Deepwater Drilling"
 HAI_begin_gonave_deepwater_drilling_desc:0 "Commit §Y90 Political Power§! and §Y110 days§! to reach deeper deposits. The project imposes §R+65% Consumer Goods Factories factor§! and adds §Y3 Oil§! on completion."
 HAI_open_gonave_southern_fields:0 "Open the Southern Gonâve Fields"
 HAI_open_gonave_southern_fields_desc:0 "Commit §Y110 Political Power§! and §Y130 days§! to open the southern field. The project imposes §R+65% Consumer Goods Factories factor§! and adds §Y3 Oil§! on completion."
 HAI_establish_national_petroleum_network:0 "Establish the National Petroleum Network"
 HAI_establish_national_petroleum_network_desc:0 "Commit §Y130 Political Power§! and §Y150 days§! to complete a national network around Gonâve. The project imposes §R+65% Consumer Goods Factories factor§! and raises total island production to §Y15 Oil§!."
 hai_gonave.84.t:0 "Platforms Beyond the First Field"
 hai_gonave.84.d:0 "New platforms now stand beyond the original survey zone. Tanker crews have doubled their rotations, storage tanks crowd the harbor and another three units of oil flow into Haitian hands."
 hai_gonave.84.a:0 "The second field is producing."
 hai_gonave.85.t:0 "Oil from Deep Water"
 hai_gonave.85.d:0 "The first deepwater well has come online after months of imported machinery, rough seas and exhausted crews. Haiti now controls a resource that once existed only in geological reports."
 hai_gonave.85.a:0 "Keep the pumps running."
 hai_gonave.86.t:0 "The Southern Field Opens"
 hai_gonave.86.d:0 "Pipelines from the southern platforms have reached Gonâve's storage depots. Production has expanded again, but every new tanker also gives the armed networks a richer target."
 hai_gonave.86.a:0 "Guard the new approaches."
 hai_gonave.87.t:0 "A Haitian Petroleum Network"
 hai_gonave.87.d:0 "Five rounds of investment have connected platforms, tanker routes, engineers and storage depots into a national petroleum network. Gonâve now produces fifteen units of oil—and its protection has become a question of national survival."
 hai_gonave.87.a:0 "Haiti has an oil industry."

 # Fuel economy categories and decision tooltips
 HAI_fuel_programs_category:0 "National Fuel Programs — [?HAI.HAI_daily_fuel_commitment|0] Fuel/Day"
 HAI_fuel_programs_category_desc:0 "Gonâve's oil can power civilian recovery and security operations. Every program consumes a fixed amount of §YFuel each day§! in addition to its starting cost. Stacking programs can empty the national stockpile; at zero fuel all active programs shut down."
 HAI_oil_security_category:0 "Defend the Petroleum Lifeline"
 HAI_oil_security_category_desc:0 "Armed networks regard Gonâve's platforms, tanker routes and technical personnel as priority targets. Haiti receives a twelve-day warning and can strengthen the relevant security layer or launch a fuel-intensive decoy."
 HAI_fuel_loss_scales_with_oil_tt:0 "The amount of §RFuel lost§! and stolen scales with Gonâve's current oil-development stage. Distributed reserves reduce the loss by half."
 HAI_fuel_ransom_scales_with_oil_tt:0 "The §RFuel ransom§! scales with Gonâve's current oil-development stage."

 HAI_fuel_fishing_fleet:0 "Fuel the Artisanal Fishing Fleet"
 HAI_fuel_fishing_fleet_desc:0 "Starting cost: §Y400 Fuel§!. For §Y90 days§!: §R300 Fuel/day§!. Keeps coastal boats operating and rewards Haiti with manpower and stability when the season ends."
 HAI_fuel_hospitals_water:0 "Fuel Hospitals and Water Pumps"
 HAI_fuel_hospitals_water_desc:0 "Starting cost: §Y500 Fuel§!. For §Y45 days§!: §R350 Fuel/day§!. Keeps ambulances, hospital generators and water pumps running."
 HAI_fuel_ferry_network:0 "Maintain the Gonâve Ferry Network"
 HAI_fuel_ferry_network_desc:0 "Starting cost: §Y600 Fuel§!. For §Y60 days§!: §R400 Fuel/day§!. Improves civilian supply and raises tanker-route security while active."
 HAI_fuel_support_local_communities:0 "Support Oil-Region Communities"
 HAI_fuel_support_local_communities_desc:0 "Starting cost: §Y800 Fuel§!. For §Y45 days§!: §R550 Fuel/day§!. Funds local transport, food deliveries and employment around the petroleum network, improving all three security layers."
 HAI_fuel_escort_tankers:0 "Escort the Tanker Convoys"
 HAI_fuel_escort_tankers_desc:0 "Starting cost: §Y900 Fuel§!. For §Y30 days§!: §R700 Fuel/day§!. Strongly protects the transport layer against Gran Grif hijackings."
 HAI_fuel_patrol_gonave_channel:0 "Patrol the Gonâve Channel"
 HAI_fuel_patrol_gonave_channel_desc:0 "Starting cost: §Y1,000 Fuel§!. For §Y30 days§!: §R750 Fuel/day§!. Strongly protects offshore installations against Viv Ansanm."
 HAI_fuel_track_gang_movements:0 "Track Gang Movements"
 HAI_fuel_track_gang_movements_desc:0 "Starting cost: §Y1,250 Fuel§!. For §Y20 days§!: §R850 Fuel/day§!. Mobile surveillance teams strongly protect engineers and specialist personnel."
 HAI_fuel_emergency_generators:0 "Run Emergency Generators"
 HAI_fuel_emergency_generators_desc:0 "Starting cost: §Y1,200 Fuel§!. For §Y30 days§!: §R900 Fuel/day§!. Restores industrial output and construction capacity during the emergency."
 HAI_fuel_power_port_au_prince:0 "Power Port-au-Prince"
 HAI_fuel_power_port_au_prince_desc:0 "Starting cost: §Y1,400 Fuel§!. For §Y30 days§!: §R950 Fuel/day§!. Keeps the capital lit, reduces consumer pressure and improves stability."
 HAI_fuel_motorized_police:0 "Deploy Motorized Police Columns"
 HAI_fuel_motorized_police_desc:0 "Starting cost: §Y1,600 Fuel§!. For §Y21 days§!: §R1,150 Fuel/day§!. Choose one armed network to suffer a severe political-coordination penalty."
 HAI_fuel_cssm_transport_pool:0 "Fuel the CSSM Transport Pool"
 HAI_fuel_cssm_transport_pool_desc:0 "Starting cost: §Y1,800 Fuel§!. For §Y30 days§!: §R1,450 Fuel/day§!. Gives the regional mission mobile supply and operational endurance."
 HAI_fuel_coastal_interdiction:0 "Launch Coastal Interdiction"
 HAI_fuel_coastal_interdiction_desc:0 "Starting cost: §Y3,000 Fuel§!. For §Y14 days§!: §R1,850 Fuel/day§!. Blocks new Viv Ansanm and Gran Grif petroleum attacks, damages their political resources and reduces escalation on completion."
 HAI_fuel_emergency_airlift:0 "Operate an Emergency Airlift"
 HAI_fuel_emergency_airlift_desc:0 "Starting cost: §Y3,500 Fuel§!. For §Y14 days§!: §R2,250 Fuel/day§!. Uses Gonâve Airport to deliver manpower, rifles and support equipment."
 HAI_fuel_caribbean_export:0 "Export Fuel to the Caribbean"
 HAI_fuel_caribbean_export_desc:0 "Starting cost: §Y4,500 Fuel§!. For §Y30 days§!: §R2,550 Fuel/day§!. Converts the strategic reserve into political power and regional influence."
 HAI_run_decoy_fuel_convoy:0 "Run a Decoy Fuel Convoy"
 HAI_run_decoy_fuel_convoy_desc:0 "Starting cost: §Y2,000 Fuel§!. For §Y14 days§!: §R1,250 Fuel/day§!. During the current warning, reduces the attacker's success chance to §Y20%§!."
 HAI_mobilize_oil_repair_crews:0 "Mobilize Oil Repair Crews"
 HAI_mobilize_oil_repair_crews_desc:0 "Starting cost: §Y1,200 Fuel§!. For §Y20 days§!: §R900 Fuel/day§!. Restores the three oil temporarily disabled by offshore sabotage."
 HAI_disperse_national_fuel_reserves:0 "Disperse the National Fuel Reserves"
 HAI_disperse_national_fuel_reserves_desc:0 "Spend §Y75 Political Power§! and endure a sixty-day construction burden. Distributed depots permanently halve the fuel seized in offshore and tanker raids."

 VIV_prepare_offshore_oil_raid:0 "Sabotage the Offshore Platforms"
 VIV_prepare_offshore_oil_raid_desc:0 "Prepare a twelve-day operation against Gonâve's production platforms. Success steals fuel, disables three oil for ninety days and raises escalation. Haiti will receive a warning and may counter the operation."
 GRF_prepare_tanker_hijacking:0 "Hijack a Gonâve Tanker Convoy"
 GRF_prepare_tanker_hijacking_desc:0 "Prepare a twelve-day ambush against the petroleum transport route. Success captures fuel, rifles and political resources. Haiti will receive a warning and may reinforce the route."
 KRB_prepare_engineer_abduction:0 "Abduct the Petroleum Engineers"
 KRB_prepare_engineer_abduction_desc:0 "Prepare a twelve-day operation against Gonâve's technical personnel. Success forces Haiti to choose between a fuel ransom, political payment or the loss of its specialists."
 HAI_GANG_sell_stolen_fuel:0 "Sell Fuel on the Black Market"
 HAI_GANG_sell_stolen_fuel_desc:0 "Consume §Y5,000 Fuel§! to obtain political power and 120 infantry weapons through regional smugglers."
 HAI_GANG_fuel_major_raid:0 "Fuel a Major Armed Operation"
 HAI_GANG_fuel_major_raid_desc:0 "Consume §Y4,000 Fuel§! to motorize fighters and couriers for forty-five days."
 HAI_GANG_buy_local_loyalty_with_fuel:0 "Buy Local Loyalty with Fuel"
 HAI_GANG_buy_local_loyalty_with_fuel_desc:0 "Consume §Y3,000 Fuel§! to supply generators, vehicles and brokers, raising stability and ruling-party popularity."

 # Fuel-program national spirits
 HAI_fuel_hospitals:0 "Fuel for Hospitals and Water Pumps"
 HAI_fuel_hospitals_desc:0 "Tankers deliver fuel to emergency generators, ambulances and water facilities."
 HAI_fuel_local_support:0 "Petroleum Community Support"
 HAI_fuel_local_support_desc:0 "Transport, food and local employment tie communities to the survival of the oil network."
 HAI_fuel_tanker_escorts:0 "Escorted Tanker Routes"
 HAI_fuel_tanker_escorts_desc:0 "Armed vehicles and patrol craft shadow petroleum movements from Gonâve."
 HAI_fuel_channel_patrol:0 "Gonâve Channel Patrols"
 HAI_fuel_channel_patrol_desc:0 "Constant patrols make an approach to the offshore platforms far harder to conceal."
 HAI_fuel_gang_tracking:0 "Mobile Gang Surveillance"
 HAI_fuel_gang_tracking_desc:0 "Fuel-backed intelligence teams track threats against specialists and engineers."
 HAI_fuel_power_capital:0 "Port-au-Prince Has Power"
 HAI_fuel_power_capital_desc:0 "The capital's pumps, lights and essential businesses remain operational."
 HAI_fuel_cssm_transport:0 "CSSM Transport Pool"
 HAI_fuel_cssm_transport_desc:0 "Regional security units have the trucks and fuel required to sustain operations."
 HAI_fuel_decoy_operation:0 "Decoy Fuel Convoys"
 HAI_fuel_decoy_operation_desc:0 "False manifests, empty tankers and guarded decoys are drawing attackers away from real reserves."
 HAI_fuel_emergency_repairs:0 "Emergency Oil Repairs"
 HAI_fuel_emergency_repairs_desc:0 "Specialist crews work continuously to restore damaged offshore output."
 HAI_fuel_reserve_construction:0 "Dispersing the Fuel Reserves"
 HAI_fuel_reserve_construction_desc:0 "New concealed depots and redundant storage sites burden the civilian economy during construction."
 HAI_distributed_fuel_reserves:0 "Distributed National Fuel Reserves"
 HAI_distributed_fuel_reserves_desc:0 "No single raid can seize the bulk of Haiti's fuel stockpile."
 HAI_oil_engineers_missing:0 "Petroleum Engineers Missing"
 HAI_oil_engineers_missing_desc:0 "The disappearance of specialist crews has delayed maintenance and forced costly improvisation."
 HAI_offshore_output_disrupted:0 "Offshore Output Disrupted"
 HAI_offshore_output_disrupted_desc:0 "Sabotage has disabled three units of Gonâve's oil production until repairs are completed."
 VIV_fuel_police_pressure:0 "Motorized Police Pressure"
 VIV_fuel_police_pressure_desc:0 "Mobile government columns are disrupting meetings, couriers and coalition checkpoints."
 GRF_fuel_police_pressure:0 "Motorized Police Pressure"
 GRF_fuel_police_pressure_desc:0 "Mobile government columns are disrupting road tolls, couriers and supply movements."
 KRB_fuel_police_pressure:0 "Motorized Police Pressure"
 KRB_fuel_police_pressure_desc:0 "Mobile government columns are disrupting safe houses, brokers and ransom channels."
 HAI_fuelled_gang_operations:0 "Fuelled Gang Operations"
 HAI_fuelled_gang_operations_desc:0 "Stolen fuel has put fighters, couriers and heavy weapons on the move."

 # Fuel crisis and petroleum-war events
 hai_fuel.50.t:0 "Where Will the Columns Strike?"
 hai_fuel.50.d:0 "Enough fuel has been reserved to keep a police column moving for three weeks. Commanders now need one priority: the metropolitan coalition, Gran Grif's road network or Kraze Baryè's ransom machine."
 hai_fuel.50.a:0 "Pressure Viv Ansanm."
 hai_fuel.50.b:0 "Pressure Gran Grif."
 hai_fuel.50.c:0 "Pressure Kraze Baryè."
 hai_fuel.52.t:0 "Depots Beyond the Capital"
 hai_fuel.52.d:0 "Engineers have begun converting warehouses, quarry sites and guarded compounds into a dispersed reserve network. For sixty days the work will absorb civilian resources, but no future raid will find the national stockpile in one place."
 hai_fuel.52.a:0 "Hide the fuel that keeps Haiti alive."
 hai_fuel.90.t:0 "Boats Circle the Offshore Platforms"
 hai_fuel.90.d:0 "Intelligence linked to the mapped armed networks reports that Viv Ansanm is assembling boats, explosives and guides for an attack on Gonâve's offshore platforms. The operation is expected within twelve days."
 hai_fuel.90.a:0 "Protect the platforms—or prepare a decoy."
 hai_fuel.91.t:0 "Gran Grif Watches the Tanker Route"
 hai_fuel.91.d:0 "Drivers and dock workers report unfamiliar observers along the Gonâve petroleum route. Gran Grif appears to be preparing a coordinated tanker hijacking within twelve days."
 hai_fuel.91.a:0 "Reinforce the convoy route."
 hai_fuel.92.t:0 "Petroleum Engineers Are Being Followed"
 hai_fuel.92.d:0 "Kraze Baryè intermediaries have been asking about shift changes, family addresses and transport schedules used by Gonâve's engineers. An abduction attempt is expected within twelve days."
 hai_fuel.92.a:0 "Move the specialists under guard."
 hai_fuel.110.t:0 "Explosions on the Gonâve Platforms"
 hai_fuel.110.d:0 "Viv Ansanm boats slipped through the patrol pattern and struck the offshore installations. Storage tanks were emptied, machinery was sabotaged and three units of oil production have gone offline."
 hai_fuel.110.a:0 "Count the missing fuel and begin repairs."
 hai_fuel.111.t:0 "The Platform Raid Is Broken"
 hai_fuel.111.d:0 "Lookouts identified the attack boats before they reached the platforms. Haitian patrols trapped the landing force in open water and forced the survivors to abandon weapons and explosives."
 hai_fuel.111.a:0 "The platforms remain in Haitian hands."
 hai_fuel.112.t:0 "Fuel and Fire on the Water"
 hai_fuel.112.d:0 "Our crews reached the platforms, drained accessible storage and disabled critical machinery before withdrawing. Haiti will need months—or an expensive repair effort—to restore full output."
 hai_fuel.112.a:0 "Hide the fuel before the patrols return."
 hai_fuel.113.t:0 "The Boats Never Reached the Platforms"
 hai_fuel.113.d:0 "Haitian patrols found our approach route and broke the operation in open water. Fighters, rifles and political credibility were lost without reaching the target."
 hai_fuel.113.a:0 "Find who exposed the route."
 hai_fuel.120.t:0 "A Tanker Convoy Disappears"
 hai_fuel.120.d:0 "Gran Grif roadblocks separated a petroleum convoy from its escort. Drivers were killed or scattered, rifles vanished and fuel tankers were driven toward Artibonite before reinforcements arrived."
 hai_fuel.120.a:0 "Secure the remaining route."
 hai_fuel.121.t:0 "The Tanker Ambush Fails"
 hai_fuel.121.d:0 "Escorts spotted false road signs and concealed firing positions before the convoy entered the trap. The tankers escaped while Gran Grif's assault force suffered severe losses."
 hai_fuel.121.a:0 "Keep the convoy moving."
 hai_fuel.122.t:0 "Tankers Reach Artibonite"
 hai_fuel.122.d:0 "The captured tankers have reached guarded depots beyond the government's immediate reach. Fuel, rifles and the prestige of the operation now belong to Gran Grif."
 hai_fuel.122.a:0 "Distribute the prize carefully."
 hai_fuel.123.t:0 "The Convoy Was Bait"
 hai_fuel.123.d:0 "Haitian escorts recognized the ambush and closed both exits. Our road teams lost men, weapons and political standing while the tankers continued toward the capital."
 hai_fuel.123.a:0 "Abandon the exposed checkpoints."
 hai_fuel.130.t:0 "The Engineers Are Hostages"
 hai_fuel.130.d:0 "Kraze Baryè has abducted members of Gonâve's petroleum staff and delivered a demand through trusted intermediaries. Haiti must pay in strategic fuel, political concessions—or accept the consequences for refusing."
 hai_fuel.130.a:0 "Pay the fuel ransom."
 hai_fuel.130.b:0 "Pay 75 Political Power through intermediaries."
 hai_fuel.130.c:0 "We will not finance kidnappers."
 hai_fuel.131.t:0 "The Abduction Team Is Captured"
 hai_fuel.131.d:0 "Surveillance teams followed the kidnappers to their staging point. The engineers were extracted before being moved, and the armed group abandoned men and rifles during its retreat."
 hai_fuel.131.a:0 "Return the engineers to Gonâve."
 hai_fuel.132.t:0 "The Petroleum Ransom Is Paid"
 hai_fuel.132.d:0 "Haiti accepted the demand. The engineers have been released through an intermediary, while fuel or political resources now strengthen our network."
 hai_fuel.132.a:0 "Move the payment before it can be traced."
 hai_fuel.133.t:0 "Haiti Refuses the Petroleum Ransom"
 hai_fuel.133.d:0 "The government refused the demand and its oil program will now operate without key specialists. The immediate ransom was lost, but Haiti has paid in instability and delay."
 hai_fuel.133.a:0 "Keep the channels open for the next target."
 hai_fuel.134.t:0 "The Engineers Slip Away"
 hai_fuel.134.d:0 "Haitian surveillance exposed the abduction team before the target was secured. Men, weapons and the secrecy of several intermediaries were lost."
 hai_fuel.134.a:0 "Burn the compromised files."
 hai_fuel.140.t:0 "Full Output Returns Offshore"
 hai_fuel.140.d:0 "Replacement pumps, repaired lines and exhausted crews have restored the three units of production disabled in the platform attack."
 hai_fuel.140.a:0 "Fill the storage tanks again."

 hai_fuel.200.t:0 "The Fishing Season Holds"
 hai_fuel.200.d:0 "Ninety days of protected fuel deliveries kept coastal boats working. Food reached local markets, crews remained employed and the fishing communities have answered the government's support."
 hai_fuel.200.a:0 "Bring the catch ashore."
 hai_fuel.201.t:0 "The Pumps Never Stopped"
 hai_fuel.201.d:0 "Hospitals, ambulances and water stations survived the emergency without exhausting their generator reserves. The program has saved lives and restored a measure of public confidence."
 hai_fuel.201.a:0 "Return the reserve tankers."
 hai_fuel.202.t:0 "A Reliable Ferry Season"
 hai_fuel.202.d:0 "Gonâve's ferries completed two months of scheduled crossings despite threats along the route. Trade and civilian travel have begun to look ordinary again."
 hai_fuel.202.a:0 "The bay remains open."
 hai_fuel.203.t:0 "Communities Defend the Oil Network"
 hai_fuel.203.d:0 "Local deliveries and employment around Gonâve have made the petroleum system more than a government project. Residents now report suspicious boats, road teams and threats against engineers."
 hai_fuel.203.a:0 "Recovery needs local allies."
 hai_fuel.204.t:0 "The Tankers Arrive Intact"
 hai_fuel.204.d:0 "Thirty days of armed escort brought every scheduled tanker through the threatened route. The temporary operation can stand down."
 hai_fuel.204.a:0 "Release the escorts."
 hai_fuel.205.t:0 "The Channel Patrol Ends"
 hai_fuel.205.d:0 "Patrol craft have completed a month of continuous sweeps around Gonâve's platforms. Attack preparations were forced deeper underground."
 hai_fuel.205.a:0 "Bring the crews ashore."
 hai_fuel.206.t:0 "Gang Movement Files Completed"
 hai_fuel.206.d:0 "Mobile surveillance teams have mapped vehicles, couriers and safe houses connected to threats against the petroleum staff."
 hai_fuel.206.a:0 "Archive the target packages."
 hai_fuel.207.t:0 "Industry Survives the Blackouts"
 hai_fuel.207.d:0 "Emergency generators carried factories and workshops through the worst outages. Production schedules have stabilized enough to end the special allocation."
 hai_fuel.207.a:0 "Refill the ordinary reserves."
 hai_fuel.208.t:0 "Thirty Nights of Light"
 hai_fuel.208.d:0 "For a month, fuel from Gonâve kept key districts of Port-au-Prince lit and essential pumps running. The capital has seen what the oil program can provide."
 hai_fuel.208.a:0 "The lights changed the public mood."
 hai_fuel.209.t:0 "The Motorized Columns Return"
 hai_fuel.209.d:0 "After three weeks of raids, inspections and rapid deployments, the police columns are returning to ordinary duty. The targeted network needs time to rebuild its political machinery."
 hai_fuel.209.a:0 "Service the vehicles."
 hai_fuel.210.t:0 "The CSSM Learns to Move"
 hai_fuel.210.d:0 "A month of reliable trucks and fuel has allowed regional units to rehearse supply, reinforcement and casualty evacuation under Haitian operational control."
 hai_fuel.210.a:0 "Write the lessons into doctrine."
 hai_fuel.211.t:0 "The Coast Is Temporarily Clear"
 hai_fuel.211.d:0 "Fourteen days of intensive patrols disrupted staging coves and smuggling routes used against Gonâve's petroleum network. The operation has bought Haiti time and reduced escalation."
 hai_fuel.211.a:0 "Bring the patrols home."
 hai_fuel.212.t:0 "The Airlift Lands Its Final Cargo"
 hai_fuel.212.d:0 "Aircraft operating through Gonâve have delivered reinforcements, rifles and support equipment above the threatened roads and ferry lanes."
 hai_fuel.212.a:0 "Unload the last flight."
 hai_fuel.213.t:0 "Haitian Fuel Reaches the Caribbean"
 hai_fuel.213.d:0 "The export program has delivered its contracted cargoes. Regional officials now treat Haiti as a source of strategic supply rather than only a recipient of aid."
 hai_fuel.213.a:0 "Turn fuel into influence."
 hai_fuel.214.t:0 "The Decoy Convoys Stand Down"
 hai_fuel.214.d:0 "False manifests and guarded empty tankers have completed their work. The emergency decoy allocation is ending."
 hai_fuel.214.a:0 "Return the fuel crews to real cargo."
 hai_fuel.215.t:0 "Repairs Restore the Platforms"
 hai_fuel.215.d:0 "Fuel-driven repair vessels and specialist crews have replaced the damaged pumps ahead of the ordinary schedule. Offshore output is restored."
 hai_fuel.215.a:0 "Restart full production."
 hai_fuel.216.t:0 "The Fuel Is No Longer in One Place"
 hai_fuel.216.d:0 "Sixty days of construction have distributed Haiti's strategic reserve among concealed and guarded sites. Future raids may still hurt, but no single convoy or depot can surrender half the country."
 hai_fuel.216.a:0 "Seal the new depot maps."
 hai_fuel.220.t:0 "The National Fuel Reserve Runs Dry"
 hai_fuel.220.d:0 "Engines have stalled across every fuel-backed program. Patrol boats are tied up, police columns are stranded and emergency deliveries have stopped. All active national fuel programs are cancelled immediately."
 hai_fuel.220.a:0 "Haiti overcommitted its last reserve."
 hai_fuel.221.t:0 "The Fuel Gauge Turns Red"
 hai_fuel.221.d:0 "The national stockpile has fallen below ten percent while special programs continue to consume fuel every day. Unless commitments are allowed to expire, the entire system will shut down."
 hai_fuel.221.a:0 "Review every active commitment."
