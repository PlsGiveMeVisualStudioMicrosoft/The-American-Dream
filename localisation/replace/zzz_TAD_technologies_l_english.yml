 # The American Dream - modern technology trees.
 #
 # The technology tree box does not read the plain key. It reads _short,
 # and it reads the equipment before the technology, and it prefers a
 # country-specific key over the generic one. USA_infantry_equipment_0_short
 # is what was still printing "M1903 Springfield". Every equipment name is
 # therefore overridden for all 55 tags the base game defines them for.

